# Method-surface error ergonomics (field-test fixes, all in shoal-value):
#
# 1. Did-you-mean hints on the unknown-method fall-through
#    (`methods/suggest.rs`): near-miss names (`.length`, `.to_upper`,
#    `.read_str`, typos within edit distance) get a `did you mean .x()?`
#    hint; box-era idioms with no direct counterpart (`.push`, `.substring`)
#    get a teaching hint. Hints are asserted via `error_contains`, which both
#    harnesses match against msg-or-hint for EVAL errors.
# 2. `.str()` on int/float/bool converts (render form) instead of erroring;
#    unconverted receivers keep the `type_error` but gain an interpolation
#    hint. (datetime/list stay pinned as errors — datetime-more.toml's
#    `dt2-str-method-is-type-error`, method-coercion-more.toml's
#    `methc-str-on-a-mixed-list-is-a-type-error`.)
# 3. Required str arguments no longer default to "" (`"x".starts_with()`
#    returned `true` — a predicate that lies): `.starts_with`/`.ends_with`/
#    `.split`/`.replace`(replacement)/`.set`(key) now raise `arg_error` when
#    the argument is missing. `.join()` keeps its deliberate "" default
#    (plain concatenation).
# 4. `feed_bytes` now matches site/content/internals/values-streams-execution.md feedability table: scalars feed
#    their `render_inline` text; a bare `path` is a name, not content →
#    `type_error` with a `.read` hint (it previously fed the path's NAME
#    bytes, silently wrong); an outcome feeds its structured `.out`
#    re-encoded, else its raw stdout bytes. (int/bool scalar feeding is also
#    pinned in io-feed-more.toml, whose two `*-is-type-error` cases were
#    updated to the documented behavior.) `stream` feeding stays an honest
#    unimplemented `type_error` — site/content/internals/language-conformance-contract.md wants incremental feeding, which
#    needs exec support.

# --- did-you-mean hints ------------------------------------------------------

[[case]]
name = "meth-err-length-on-list-suggests-len"
src = "[1, 2].length()"
error = "field_missing"
error_contains = "did you mean .len()?"

[[case]]
name = "meth-err-size-on-list-suggests-len"
src = "[1, 2, 3].size()"
error = "field_missing"
error_contains = "did you mean .len()?"

[[case]]
name = "meth-err-size-on-str-suggests-len"
src = '"abc".size()'
error = "field_missing"
error_contains = "did you mean .len()?"

[[case]]
name = "meth-err-to-upper-suggests-upper"
src = '"a".to_upper()'
error = "field_missing"
error_contains = "did you mean .upper()?"

[[case]]
name = "meth-err-to-lower-suggests-lower"
src = '"A".to_lower()'
error = "field_missing"
error_contains = "did you mean .lower()?"

[[case]]
name = "meth-err-read-str-on-path-suggests-read"
src = 'path("a.txt").read_str()'
error = "field_missing"
error_contains = "did you mean .read()?"

[[case]]
name = "meth-err-push-on-list-teaches-concat"
# There is no `.push` — values are immutable; concatenate instead.
src = "[1].push(2)"
error = "field_missing"
error_contains = "list + [item]"

[[case]]
name = "meth-err-substring-suggests-take-skip"
src = '"hello".substring(2)'
error = "field_missing"
error_contains = ".take(n)"

[[case]]
name = "meth-err-typo-within-distance-suggests"
src = "[3, 1].sortt()"
error = "field_missing"
error_contains = "did you mean .sort()?"

[[case]]
name = "meth-err-unrelated-name-gets-no-suggestion"
# Nothing plausible: same bare `field_missing` as before, no hint attached
# (asserting the msg text still matches proves nothing was bolted on).
src = "[1].frobnicate()"
error = "field_missing"
error_contains = "unknown method `.frobnicate` on list"

# `.filter` and `.count` are NOT near-misses — they already alias `.where`
# and `.len` in the dispatcher.

[[case]]
name = "meth-filter-alias-already-works"
src = "[1, 2, 3].filter(x => x > 1)"
value = "[2, 3]"

[[case]]
name = "meth-count-alias-already-works"
src = "[1, 2].count()"
value = "2"

# --- .str() on primitive scalars --------------------------------------------

[[case]]
name = "meth-int-str-renders-decimal"
src = "42.str()"
value = '"42"'

[[case]]
name = "meth-float-str-renders"
src = "let x = 1.5\nx.str()"
value = '"1.5"'

[[case]]
name = "meth-bool-str-renders"
src = "true.str()"
value = '"true"'

[[case]]
name = "meth-str-on-datetime-hints-interpolation"
# Still a type_error (pinned by dt2-str-method-is-type-error) — but now it
# teaches the interpolation spelling that always works.
src = 't"2026-07-09T14:00Z".str()'
error = "type_error"
error_contains = "interpolation"

# --- required str arguments (no more silent \"\" defaults) -------------------

[[case]]
name = "meth-starts-with-missing-arg-is-arg-error"
# Was: defaulted to "" and returned true — a predicate that lies.
src = '"hello".starts_with()'
error = "arg_error"
error_contains = "requires a prefix"

[[case]]
name = "meth-ends-with-missing-arg-is-arg-error"
src = '"hello".ends_with()'
error = "arg_error"
error_contains = "requires a suffix"

[[case]]
name = "meth-split-missing-arg-is-arg-error"
src = '"a,b".split()'
error = "arg_error"
error_contains = "requires a separator"

[[case]]
name = "meth-replace-missing-replacement-is-arg-error"
# Was: defaulted to "" and silently deleted every occurrence.
src = '"foo".replace("o")'
error = "arg_error"
error_contains = "requires a replacement"

[[case]]
name = "meth-set-missing-key-is-arg-error"
# Was: key defaulted to "" (and the error blamed argument 2).
src = "{a: 1}.set()"
error = "arg_error"
error_contains = "requires a key"

[[case]]
name = "meth-join-no-arg-still-concatenates"
# Deliberate default kept: zero-arg join has one obvious meaning.
src = '["a", "b"].join()'
value = '"ab"'

[[case]]
name = "meth-starts-with-explicit-empty-str-still-legal"
src = '"abc".starts_with("")'
value = "true"

# --- feed_bytes vs site/content/internals/values-streams-execution.md ------------------------------------------------

[[case]]
name = "feed-size-renders-humanized"
src = "1kb.feed(cat).out"
value = '"1kb"'

[[case]]
name = "feed-duration-renders-compound"
src = "250ms.feed(cat).out"
value = '"250ms"'

[[case]]
name = "feed-float-renders-decimal"
src = "let x = 2.5\nx.feed(cat).out"
value = '"2.5"'

[[case]]
name = "feed-path-is-type-error-with-read-hint"
# A bare path is a name, not content (site/content/internals/values-streams-execution.md) — previously fed the
# NAME's bytes, silently wrong.
src = 'path("a.txt").feed(cat)'
fixture = ["a.txt"]
error = "type_error"
error_contains = "a name, not"

[[case]]
name = "feed-outcome-text-out-feeds-stdout-bytes"
# outcome → `.out` is plain text here, so the raw stdout bytes flow through.
src = '["b", "a"].feed(sort).feed(cat).out'
value = '"a\nb"'

[[case]]
name = "feed-outcome-structured-out-reencodes-json"
# outcome → `.out` parsed as a record, so feeding re-encodes the JSON:
# `outcome.feed(cmd)` ≡ `outcome.out.feed(cmd)` (site/content/internals/values-streams-execution.md).
src = "{n: 5}.feed(cat).feed(cat).out.n"
value = "5"

[[case]]
name = "feed-stream-is-unimplemented-with-collect-hint"
# site/content/internals/language-conformance-contract.md promises incremental stream feeding; that needs exec support, so the
# honest state is an error that names the workaround.
src = "[1, 2].stream().feed(cat)"
error = "type_error"
error_contains = "collect"

# A handful of small, deterministic compositional cases not yet covered
# elsewhere: `.str()` on a plain `int` (UPDATED: `strops::to_str` gained
# int/float/bool arms that yield the canonical render form — the old
# "cannot convert int to str" type_error was a field-tested paper cut, and
# TDD §5 / CONTRACTS §3 pin `.str` in the method set without restricting
# the receiver; datetime/list/… receivers still error, per
# dt2-str-method-is-type-error and methc-str-on-a-mixed-list-is-a-type-error),
# a record's `.values()` feeding `.flatten()`, and a `.sort_by` result
# immediately `.reverse()`d (descending via ascending-then-flip, distinct
# from list2-sort-by-descending-key's negated-key approach in
# list-methods-2.toml).

[[case]]
name = "misc-int-str-method-renders-decimal"
src = "(5).str()"
value = '"5"'

[[case]]
name = "misc-record-values-then-flatten"
src = "{a: [1, 2], b: [3, 4]}.values().flatten()"
value = "[1, 2, 3, 4]"

[[case]]
name = "misc-sort-by-then-reverse-is-descending"
src = '["bb", "a", "ccc"].sort_by(s => s.len()).reverse()'
value = '["ccc", "bb", "a"]'

[[case]]
name = "misc-split-map-upper-join-pipeline"
src = '''
let s = "hello world"
s.split(" ").map(w => w.upper()).join("-")
'''
value = '"HELLO-WORLD"'

[[case]]
name = "misc-string-concatenation-chain"
src = '"a" + "b" + "c"'
value = '"abc"'

[[case]]
name = "misc-nested-map-where-sum-pipeline"
src = "[1, 2, 3].map(x => x * x).where(x => x > 3).sum()"
value = "13"

# `.tap(f)` / `.also(f)` — the shoal answer to bash `tee`: run f for its side
# effect, return the receiver UNCHANGED so a dot-chain keeps flowing (there is
# no pipe to split, and a value is already both shown and reusable). See
# crates/shoal-value/src/methods/mod.rs dispatch.

[[case]]
name = "misc-tap-returns-receiver-unchanged"
src = '[1, 2, 3].tap(x => x.len()).map(y => y * 10)'
value = "[10, 20, 30]"

[[case]]
name = "misc-tap-runs-the-side-effect"
src = '''
"payload".tap(s => s.save("tapped.txt"))
path("tapped.txt").read
'''
value = '"payload"'

[[case]]
name = "misc-also-is-an-alias-for-tap"
src = '{a: 5}.also(r => r.a).a'
value = "5"

[[case]]
name = "misc-tap-on-outcome-taps-the-outcome-not-out"
# `.tap` sees the full outcome (`.ok`), then passes the outcome through so
# `.out` still resolves.
src = '(echo hi).tap(o => o.ok).out'
value = '"hi"'

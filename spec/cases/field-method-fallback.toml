# The `.field` accessor falls back to a zero-arg METHOD of the same name when
# no such field exists, so the bare-`.field` sugar (used heavily by implicit
# `.map(.x)`/`.where(.x)` lambdas) reaches methods too — `["a"].map(.upper)`,
# `[1,2,3].sum`. A present field always WINS over a same-named method (user
# data ahead of the stdlib), and when neither exists the error still names the
# missing field. See crates/shoal-eval/src/expr_access.rs (`field_or_method`)
# and docs/CONTRACTS.md §3.
#
# IMPORTANT — the fallback is deliberately NOT extended to RECORD receivers:
# a record's field namespace is user-controlled, so a bare `.name` that misses
# a field raises `field_missing` (strict) rather than silently invoking a
# same-named builtin method. That strictness is pinned in
# lambda-and-record-strict.toml; here `record.method()` uses explicit parens.

[[case]]
name = "map-upper-shorthand"
src = '["a", "b", "c"].map(.upper)'
value = '["A", "B", "C"]'

[[case]]
name = "map-len-shorthand"
src = '["aa", "b", "ccc"].map(.len)'
value = "[2, 1, 3]"

[[case]]
name = "sum-as-field"
src = '[1, 2, 3].sum'
value = "6"

[[case]]
name = "str-upper-no-parens"
src = '"hi".upper'
value = '"HI"'

[[case]]
name = "record-method-json-with-parens"
# On a RECORD the bare-`.field` fallback is intentionally OFF (records own
# their field namespace), so a builtin record method is called with parens.
# `{a: 1, b: 2}.json` (no parens) instead raises `field_missing` — pinned in
# lambda-and-record-strict.toml.
src = '{a: 1, b: 2}.json()'
value = '"{\"a\":1,\"b\":2}"'

[[case]]
name = "field-wins-over-method"
# `keys` is both a record method and, here, a user field — the field wins.
# (Bare `.keys` resolves because `keys` IS a field, not via method fallback.)
src = '{keys: "mydata"}.keys'
value = '"mydata"'

[[case]]
name = "map-reverse-shorthand-on-strings"
src = '["ab", "cd"].map(.reverse)'
value = '["ba", "dc"]'

[[case]]
name = "missing-field-and-method-names-the-field"
src = '{a: 1}.nope'
error = "field_missing"
error_contains = "nope"

[[case]]
name = "where-predicate-uses-method-fallback"
# `.is_empty` is a method; the `.where(.is_empty)` shorthand reaches it.
src = '[[], [1], [], [2, 3]].where(.is_empty).len()'
value = "2"

# The zero-arg aggregates (`sum`/`min`/`max`) reject a stray argument LOUDLY.
# A projection lambda used to be dropped silently — `[1,2,3].sum(x => x)`
# returned `6` (right-looking, wrong reasoning) and `ls.sum(.size)` gave a
# confusing `type_error`. The correct idiom is `.map(f).sum()`, which the error
# names. The bare-`.field`→method fallback still passes no args, so the no-arg
# forms below stay valid. See crates/shoal-value/src/methods/mod.rs.

[[case]]
name = "sum-rejects-projection-lambda"
src = '[1, 2, 3].sum(x => x)'
error = "arg_error"
error_contains = "sum takes no arguments"

[[case]]
name = "min-rejects-projection-lambda"
src = '[3, 1, 2].min(x => x)'
error = "arg_error"
error_contains = "min takes no arguments"

[[case]]
name = "max-rejects-projection-lambda"
src = '[3, 1, 2].max(.value)'
error = "arg_error"
error_contains = "max takes no arguments"

[[case]]
name = "sum-parens-no-arg-still-works"
src = '[1, 2, 3].sum()'
value = "6"

[[case]]
name = "min-parens-no-arg-still-works"
src = '[3, 1, 2].min()'
value = "1"

[[case]]
name = "max-parens-no-arg-still-works"
src = '[3, 1, 2].max()'
value = "3"

[[case]]
name = "map-then-sum-is-the-projection-idiom"
# The suggested replacement for `.sum(f)` — project with `.map`, then aggregate.
src = '[{n: 1}, {n: 2}, {n: 3}].map(.n).sum()'
value = "6"

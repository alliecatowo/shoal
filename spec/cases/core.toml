src="2 <= 2"
value="true"
[[case]]
name="cmp-gt"
src="3 > 2"
value="true"
[[case]]
name="cmp-ge"
src="3 >= 3"
value="true"
[[case]]
name="logical-not"
src="!false"
value="true"
[[case]]
name="logical-and-short"
src="false && missing"
value="false"
[[case]]
name="logical-or-short"
src="true || missing"
value="true"
[[case]]
name="coalesce-null"
src="null ?? 7"
value="7"
[[case]]
name="coalesce-value"
src="3 ?? 7"
value="3"

[[case]]
name="string-raw"
src="'a\\nb'"
value='"a\\nb"'
[[case]]
name="string-escape"
# One backslash-n escape in an interpolating string is a real newline char;
# render_inline re-escapes it back to the two-character `\n` form (site/content/internals/intercrate-protocol-contracts.md).
src='"a\nb"'
value='"a\nb"'
[[case]]
name="string-interp"
src='"answer {6 * 7}"'
value='"answer 42"'
[[case]]
name="list-basic"
src="[1, 2, 3]"
value="[1, 2, 3]"
[[case]]
name="list-index"
src="[4, 5, 6][1]"
value="5"
[[case]]
name="list-index-negative"
src="[4, 5, 6][-1]"
value="6"
[[case]]
name="list-index-range"
src="[1][3]"
error="index_range"
[[case]]
name="record-basic"
src='{name: "shoal", n: 2}'
value='{name: "shoal", n: 2}'
[[case]]
name="record-field"
src='{name: "shoal"}.name'
value='"shoal"'
[[case]]
name="record-missing"
src='{name: "shoal"}.missing'
error="field_missing"

[[case]]
name="let-read"
src="let x = 4\nx + 1"
value="5"
[[case]]
name="var-assign"
src="var x = 4\nx = 9\nx"
value="9"
[[case]]
name="var-compound"
src="var x = 4\nx += 3\nx"
value="7"
[[case]]
name="let-immutable"
src="let x = 4\nx = 9"
error="type_error"
[[case]]
name="undefined"
src="let x = missing"
error="undefined_var"
[[case]]
name="if-true"
src="if true { 1 } else { 2 }"
value="1"
[[case]]
name="if-false"
src="if false { 1 } else { 2 }"
value="2"
[[case]]
name="no-truthiness"
src="if [1] { 1 }"
error="type_error"
error_contains="no truthiness"
[[case]]
name="range-exclusive"
src="1..4"
value="1..4"
[[case]]
name="range-inclusive"
src="1..=3"
value="1..=3"

[[case]]
name="fn-call"
src="fn add(a: int, b: int) { a + b }\nadd(2, 5)"
value="7"
[[case]]
name="fn-default"
src="fn inc(a: int, by: int = 1) { a + by }\ninc(4)"
value="5"

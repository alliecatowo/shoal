# Core evaluator and parser conformance cases. Each case is isolated.

[[case]]
name="arith-add"
src="2 + 3"
value="5"
[[case]]
name="arith-sub"
src="9 - 4"
value="5"
[[case]]
name="arith-mul"
src="6 * 7"
value="42"
[[case]]
name="arith-div"
src="8 / 2"
value="4"
[[case]]
name="arith-rem"
src="10 % 4"
value="2"
[[case]]
name="arith-precedence"
src="2 + 3 * 4"
value="14"
[[case]]
name="arith-parens"
src="(2 + 3) * 4"
value="20"
[[case]]
name="arith-neg"
src="-(2 + 3)"
value="-5"
[[case]]
name="float-promotion"
src="2 + 0.5"
value="2.5"

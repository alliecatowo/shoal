name="lambda-call-method"
src="[1,2,3].map(x => x * 2)"
value="[2, 4, 6]"
[[case]]
name="multi-lambda"
src="let add = (a, b) => a + b\nadd(3, 4)"
value="7"
[[case]]
name="method-len"
src="[1,2,3].len()"
value="3"
[[case]]
name="method-first"
src="[8,9].first()"
value="8"
[[case]]
name="method-is-empty"
src="[].is_empty()"
value="true"
[[case]]
name="method-lines"
src='"a\nb".lines()'
value='["a", "b"]'
[[case]]
name="method-upper"
src='"shoal".upper()'
value='"SHOAL"'
[[case]]
name="method-trim"
src='"  x  ".trim()'
value='"x"'

[[case]]
name="parse-pipe-teaching"

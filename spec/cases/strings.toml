# String literal forms: interpolating "…" escapes, raw '…' (no escapes),
# triple """…"""/'''…''' multiline dedent, interpolation nesting.
# Render expectations per site/content/internals/intercrate-protocol-contracts.md (render_inline double-quotes,
# escaping control chars back to their two-char form).

[[case]]
name = "str-escape-newline-alt"
src = '"x\ny"'
value = '"x\ny"'

[[case]]
name = "str-escape-tab"
src = '"a\tb"'
value = '"a\tb"'

[[case]]
name = "str-escape-carriage-return"
src = '"a\rb"'
value = '"a\rb"'

[[case]]
name = "str-escape-null"
src = '"a\0b"'
value = '"a\0b"'

[[case]]
name = "str-escape-backslash"
src = '"a\\b"'
value = '"a\\b"'

[[case]]
name = "str-escape-quote"
src = '"say \"hi\""'
value = '"say \"hi\""'

[[case]]
name = "str-escape-braces-suppress-interp"
# \{ \} escape braces so they are literal text, not interpolation.
src = '"a\{b\}"'
value = '"a{b}"'

[[case]]
name = "str-escape-unicode-crab"
src = '"\u{1F980}"'
value = "\"🦀\""

[[case]]
name = "str-raw-no-escapes"
src = "'a\\nb'"
value = '"a\\nb"'

[[case]]
name = "str-raw-preserves-tab-text"
src = "'a\\tb'"
value = '"a\\tb"'

[[case]]
name = "str-interp-arith"
src = '"answer {6 * 7}"'
value = '"answer 42"'

[[case]]
name = "str-interp-two-holes"
src = '"{1} and {2}"'
value = '"1 and 2"'

[[case]]
name = "str-interp-nested-method-call"
src = "let name = \"shoal\"\n\"hi {name.upper()}\""
value = '"hi SHOAL"'

[[case]]
name = "str-interp-list-value"
src = '"xs = {[1, 2]}"'
value = '"xs = [1, 2]"'

[[case]]
name = "str-triple-double-dedent"
src = "let s = \"\"\"\n    hello\n    world\n    \"\"\"\ns"
value = '"hello\nworld"'

[[case]]
name = "str-triple-raw-dedent"
src = "let s = '''\n    plain text\n    line two\n    '''\ns"
value = '"plain text\nline two"'

[[case]]
name = "str-len-counts-chars"
src = '"hello".len()'
value = "5"

[[case]]
name = "str-lines-strips-crlf"
# site/content/internals/intercrate-protocol-contracts.md, site/content/internals/language-conformance-contract.md: .lines() strips \r?\n.
src = "\"a\\r\\nb\".lines()"
value = '["a", "b"]'

[[case]]
name = "str-plus-int-is-type-error"
src = '"a" + 1'
error = "type_error"

[[case]]
name = "str-empty-len-is-zero"
src = '"".len()'
value = "0"

[[case]]
name = "str-compare-lexicographic"
src = '"apple" < "banana"'
value = "true"

# --- string method hardening (site/content/internals/intercrate-protocol-contracts.md value methods:
# .words .chars .split .starts_with .ends_with .replace .parse_int
# .parse_float .matches .match). Deterministic, spec-derived. ---

[[case]]
name = "str-words-splits-on-whitespace"
src = '"the quick fox".words()'
value = '["the", "quick", "fox"]'

[[case]]
name = "str-chars-splits-per-character"
src = '"ab".chars()'
value = '["a", "b"]'

[[case]]
name = "str-split-on-separator"
src = '"a,b,c".split(",")'
value = '["a", "b", "c"]'

[[case]]
name = "str-starts-with-true"
src = '"hello".starts_with("he")'
value = "true"

[[case]]
name = "str-ends-with-true"
src = '"hello".ends_with("lo")'
value = "true"

[[case]]
name = "str-replace-all-occurrences"
src = '"foo bar foo".replace("foo", "baz")'
value = '"baz bar baz"'

[[case]]
name = "str-parse-int-success"
src = '"42".parse_int()'
value = "42"

[[case]]
name = "str-parse-float-success"
src = '"3.5".parse_float()'
value = "3.5"

[[case]]
name = "str-matches-regex-all-occurrences"
src = '"a1b22c333".matches(re"[0-9]+")'
value = '["1", "22", "333"]'

[[case]]
name = "str-match-regex-first-occurrence"
src = '"a1b22c333".match(re"[0-9]+")'
value = '"1"'

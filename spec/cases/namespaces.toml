# Data & system namespaces (site/content/internals/language-conformance-contract.md "Namespaces", site/content/internals/roadmap-and-priorities.md mini-spec):
# json/yaml/toml/csv/math as first-class values in the root env, intercepted
# by shoal-eval's `namespaces.rs` before ordinary var/field/method dispatch.
# Deterministic-only: `http`/`os` need the network or the host's real
# inventory and are exercised in shoal-eval's own unit tests, not here.
#
# Float assertions below are restricted to identities IEEE-754/libm guarantee
# exact (sqrt of a perfect square, `pow(x, 0)`, `ln(1)`, trig at 0, etc.) so
# this file never depends on a transcendental function's last-bit rounding.

# --- json ---------------------------------------------------------------

[[case]]
name = "ns-json-parse-object-field"
src = '''json.parse('{"a": 1}').a'''
value = "1"

[[case]]
name = "ns-json-parse-array"
src = 'json.parse("[1, 2, 3]")'
value = "[1, 2, 3]"

[[case]]
name = "ns-json-parse-nested-object"
src = '''json.parse('{"a": {"b": 2}}').a.b'''
value = "2"

[[case]]
name = "ns-json-parse-string-scalar"
src = '''json.parse('"hi"')'''
value = '"hi"'

[[case]]
name = "ns-json-parse-bool-and-null"
src = 'json.parse("[true, false, null]")'
value = "[true, false, null]"

[[case]]
name = "ns-json-parse-float"
src = 'json.parse("3.5")'
value = "3.5"

[[case]]
name = "ns-json-parse-invalid-is-arg-error"
# A raw (single-quoted) shoal string, not a double-quoted one: `{`/`}` inside
# a `"…"` string would start interpolation and this text has no matching
# hole, so a raw string is the correct way to smuggle brace-shaped garbage
# straight into `json.parse` as a runtime (not parse-time) failure.
src = '''json.parse('{not valid')'''
error = "arg_error"

[[case]]
name = "ns-json-parse-missing-arg-is-arg-error"
src = "json.parse()"
error = "arg_error"

[[case]]
name = "ns-json-parse-non-str-arg-is-arg-error"
src = "json.parse(5)"
error = "arg_error"

[[case]]
name = "ns-json-stringify-record-compact"
src = "json.stringify({a: 1})"
value = '"{\"a\":1}"'

[[case]]
name = "ns-json-stringify-list"
src = "json.stringify([1, 2])"
value = '"[1,2]"'

[[case]]
name = "ns-json-stringify-pretty-has-newlines"
src = "json.stringify({a: 1}, pretty: true).contains(\"\\n\")"
value = "true"

[[case]]
name = "ns-json-stringify-non-pretty-has-no-newlines"
src = "json.stringify({a: 1}).contains(\"\\n\")"
value = "false"

[[case]]
name = "ns-json-roundtrip-record-and-list"
src = "json.parse(json.stringify({a: 1, b: [1, 2]}))"
value = "{a: 1, b: [1, 2]}"

[[case]]
name = "ns-json-stringify-missing-arg-is-arg-error"
src = "json.stringify()"
error = "arg_error"

# --- yaml -----------------------------------------------------------------

[[case]]
name = "ns-yaml-parse-mapping-field"
src = 'yaml.parse("a: 1\nb: 2").a'
value = "1"

[[case]]
name = "ns-yaml-parse-sequence"
src = 'yaml.parse("- 1\n- 2\n- 3")'
value = "[1, 2, 3]"

[[case]]
name = "ns-yaml-parse-nested-mapping"
src = 'yaml.parse("a:\n  b: 2").a.b'
value = "2"

[[case]]
name = "ns-yaml-parse-invalid-is-arg-error"
src = 'yaml.parse("a: [1, 2")'
error = "arg_error"

[[case]]
name = "ns-yaml-stringify-contains-key-value"
src = 'yaml.stringify({a: 1}).contains("a: 1")'
value = "true"

[[case]]
name = "ns-yaml-roundtrip"
src = "yaml.parse(yaml.stringify({a: 1, b: 2})).b"
value = "2"

[[case]]
name = "ns-yaml-parse-missing-arg-is-arg-error"
src = "yaml.parse()"
error = "arg_error"

# --- toml -------------------------------------------------------------------

[[case]]
name = "ns-toml-parse-simple-key"
src = 'toml.parse("a = 1").a'
value = "1"

[[case]]
name = "ns-toml-parse-table"
src = 'toml.parse("[a]\nb = 1").a.b'
value = "1"

[[case]]
name = "ns-toml-parse-string-value"
src = '''toml.parse('name = "shoal"').name'''
value = '"shoal"'

[[case]]
name = "ns-toml-parse-invalid-is-arg-error"
src = 'toml.parse("not = = valid")'
error = "arg_error"

[[case]]
name = "ns-toml-stringify-contains-key-value"
src = 'toml.stringify({a: 1}).contains("a = 1")'
value = "true"

[[case]]
name = "ns-toml-roundtrip"
src = "toml.parse(toml.stringify({a: 1, b: \"x\"})).b"
value = '"x"'

[[case]]
name = "ns-toml-stringify-non-table-top-level-is-arg-error"
# site/content/internals/language-conformance-contract.md, site/content/internals/roadmap-and-priorities.md: toml needs a record/table at the top level; a bare list has
# no key to hang off of.
src = "toml.stringify([1, 2])"
error = "arg_error"

[[case]]
name = "ns-toml-parse-missing-arg-is-arg-error"
src = "toml.parse()"
error = "arg_error"

# --- csv ----------------------------------------------------------------

[[case]]
name = "ns-csv-parse-simple-table"
src = 'csv.parse("a,b\n1,2\n3,4")'
value = '[{a: "1", b: "2"}, {a: "3", b: "4"}]'

[[case]]
name = "ns-csv-parse-header-only-is-empty-table"
src = 'csv.parse("a,b")'
value = "[]"

[[case]]
name = "ns-csv-parse-single-column"
src = 'csv.parse("name\nada\ngrace").len()'
value = "2"

[[case]]
name = "ns-csv-parse-invalid-is-arg-error"
# A row with fewer fields than the header, under strict flexible=false
# (the default `ReaderBuilder`), is a parse error.
src = 'csv.parse("a,b\n1")'
error = "arg_error"

[[case]]
name = "ns-csv-roundtrip-record-list"
src = 'csv.parse(csv.stringify([{a: "1", b: "2"}]))'
value = '[{a: "1", b: "2"}]'

[[case]]
name = "ns-csv-stringify-of-table-value"
src = 'csv.parse(csv.stringify(csv.parse("a,b\n1,2")))'
value = '[{a: "1", b: "2"}]'

[[case]]
name = "ns-csv-stringify-non-table-is-type-error"
src = "csv.stringify(5)"
error = "type_error"

[[case]]
name = "ns-csv-parse-missing-arg-is-arg-error"
src = "csv.parse()"
error = "arg_error"


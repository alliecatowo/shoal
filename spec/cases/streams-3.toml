# Further stream hardening beyond streams.toml/streams-more.toml: `.buffer(0)`
# is a lossless rendezvous handoff with no readahead, and `.window` on an empty
# source produces no windows rather than an error.

[[case]]
name = "stream3-buffer-zero-is-lossless-rendezvous"
src = "[1, 2].stream().buffer(0).collect()"
value = "[1, 2]"

[[case]]
name = "stream3-buffer-capacity-has-an-admission-wall"
src = "[1].stream().buffer(4097).collect()"
error = "arg_error"

[[case]]
name = "stream3-window-on-empty-source-is-empty"
src = "[].stream().window(2).collect()"
value = "[]"

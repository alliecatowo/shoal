# Further stream hardening beyond streams.toml/streams-more.toml:
# `.buffer(0)` — a zero-capacity decoupling buffer (HR-G1) is a rendezvous
# handoff between the producer thread and the consumer: no readahead, but
# every element still crosses losslessly and in order — and `.window` on an
# empty source producing no windows at all rather than an error.

[[case]]
name = "stream3-buffer-zero-is-lossless-rendezvous"
src = "[1, 2].stream().buffer(0).collect()"
value = "[1, 2]"

[[case]]
name = "stream3-window-on-empty-source-is-empty"
src = "[].stream().window(2).collect()"
value = "[]"

# Further stream hardening beyond streams.toml/streams-more.toml: `.buffer`
# requires positive bounded capacity, and `.window` on an empty source produces
# no windows rather than an error.

[[case]]
name = "stream3-buffer-zero-is-rejected"
src = "[1, 2].stream().buffer(0).collect()"
error = "arg_error"
error_contains = "positive"

[[case]]
name = "stream3-window-on-empty-source-is-empty"
src = "[].stream().window(2).collect()"
value = "[]"

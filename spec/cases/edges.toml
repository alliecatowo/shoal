# TDD §13's normative edge-case register — the deterministic, host-safe
# subset not already covered by strings.toml (§13.10 CRLF), io.toml (§13.13
# `sh {}` brace balance), coercion.toml (§4.3 glob binding), outcome.toml
# (§13.6's `ok`/`.out` shape). Each case cites its §13 item.

# --- §13.2: filenames with a leading `-` are values, not flags -------------

[[case]]
name = "edge-leading-dash-filename-preserved-as-data"
# A literal filename starting with `-` must survive as ordinary path DATA
# once inside a structured `table` row — it is never re-interpreted as a
# flag downstream (D2: "values, not text").
fixture = ["-rf"]
src = 'ls.where(r => r.name == "-rf").len()'
value = "1"

# --- §13.3: bare `-` is a literal word, never swallowed as a flag ---------

[[case]]
name = "edge-bare-dash-is-a-literal-word-not-a-flag"
# `-` alone has no chars after it, so the lexer's `"-" SHORTS` flag
# production (which needs >=1 char) cannot match — it lexes as a plain WORD.
# `cat -` therefore attempts to open a file literally named `-` (which this
# fixture-less temp cwd doesn't have) rather than erroring over a malformed
# flag.
src = "cat -"
error = "custom"

# --- §13.4: an empty glob match yields zero argv entries, not an error ---

[[case]]
name = "edge-empty-glob-contributes-zero-argv-entries"
# TDD §4.3 / §13.4: "zero matches yields zero argv entries plus the
# statement lint" — `args.rs::expand_arg` returns an empty `Vec` for a
# glob with no filesystem matches (this harness can't observe the stderr
# lint, only the argv-count effect), so the surrounding words are unaffected
# and `echo` sees exactly two arguments, not three with an empty middle one.
src = "(echo before *.nonexistent-ext-zzz after).out"
value = '"before after"'

# --- §13.9: command-not-found ------------------------------------------

[[case]]
name = "edge-command-not-found"
src = "zzzznotarealcommandxyz123"
error = "not_found"

# §13.9 command did-you-mean: an unresolvable head that is a near-miss of a
# KNOWN command earns a `did you mean 'X'?` hint (the command-head analogue of
# the method did-you-mean). Candidates are host-independent — the canonical
# builtin registry, adapter heads, and in-scope callable bindings — so no $PATH
# scan taints the suggestion. The primary `not_found` code/message is unchanged;
# only a hint is added, and both harnesses match `error_contains` against
# msg-OR-hint. The conformance evaluator loads no adapters, so these cases pin
# the builtin + session-binding sources (adapter + threshold coverage lives in
# `crates/shoal-eval/src/command.rs`'s unit tests).
[[case]]
name = "edge-command-not-found-hint-journal"
src = "journl"
error = "not_found"
error_contains = "did you mean 'journal'?"

[[case]]
name = "edge-command-not-found-hint-pushd"
src = "puhd"
error = "not_found"
error_contains = "did you mean 'pushd'?"

[[case]]
name = "edge-command-not-found-hint-which"
src = "wich"
error = "not_found"
error_contains = "did you mean 'which'?"

[[case]]
name = "edge-command-not-found-hint-sleep"
src = "slee 1ms"
error = "not_found"
error_contains = "did you mean 'sleep'?"

# A callable session binding (fn/alias) joins the candidate set, so a typo of a
# just-defined command resolves to it.
[[case]]
name = "edge-command-not-found-hint-session-binding"
src = "fn deploy() { 42 }\ndeployy"
error = "not_found"
error_contains = "did you mean 'deploy'?"

# A head too far from anything known stays a bare `not_found` — no bogus hint.
# (The harness can only assert a substring is PRESENT, so absence of a hint is
# pinned precisely by the `command_suggestion` unit tests; this case documents
# that a wildly-unlike head still errors cleanly with the unchanged code.)
[[case]]
name = "edge-command-not-found-no-hint-when-far"
src = "xyzzy"
error = "not_found"

# --- §13.15: shadowing a command is legal; `^name` always escapes it -----

[[case]]
name = "edge-shadowed-command-name-resolves-to-the-value"
src = "let ls = 5\nls"
value = "5"

[[case]]
name = "edge-caret-forces-command-despite-shadow"
fixture = ["a.txt"]
src = "let ls = 5\n(^ls).out.len()"
value = "1"

# --- §13.16: `it`/`out` are REPL-only; a script never sees them ----------

[[case]]
name = "edge-it-in-script-is-a-parse-error"
# A BARE leading `it` dispatches as a COMMAND statement (rule 3.1.3 — it's
# unbound, so it resolves through fn/alias/adapter/PATH, not through the
# EXPR-mode `primary()` parser that carries the REPL-only check), so it
# would just be a plain (eval-time) `not_found`. `it.foo` triggers the
# refinement in rule 3.1.3 ("identifier immediately followed by `.`... ->
# EXPR statement"), routing `it` through `primary()` for real, where the
# check lives. (A bare parenthesized `(it)` does NOT hit this check —
# `paren_or_lambda`'s single-bare-ident special case bypasses it; that gap
# is real but out of scope for spec/cases to fix.)
src = "it.foo"
parse_error = true
parse_error_contains = "REPL-only"

[[case]]
name = "edge-out-in-script-is-a-parse-error"
src = "out.foo"
parse_error = true
parse_error_contains = "REPL-only"

[[case]]
name = "edge-bare-parenthesized-it-bypasses-repl-only-check"
# A genuine gap found while authoring the two cases above: `primary()`'s
# `Tok::Ident` arm carries the `it`/`out` REPL-only check (confirmed by
# `it.foo`/`out.foo`/`1 + it` all correctly erroring), but `(it)` alone does
# NOT error — `paren_or_lambda`'s handling of a single bare identifier
# inside parens is a separate code path that never reaches that check, so
# `it`/`out` slip through as ordinary (if REPL-context-less) `Var` refs.
src = "(it)"
parse_error = true
parse_error_contains = "REPL-only"

# --- §13.6: signal death surfaces as `signal`, `status` stays null, never
# a synthesized 128+n exit code -------------------------------------------

[[case]]
name = "edge-signal-death-reports-signal-name"
src = '''
let r = (sh -c 'kill -SEGV $$')
r.signal
'''
value = '"SIGSEGV"'

[[case]]
name = "edge-signal-death-status-is-null-not-128-plus-n"
src = '''
let r = (sh -c 'kill -SEGV $$')
r.status
'''
value = "null"

[[case]]
name = "edge-signal-death-ok-is-false"
src = '''
let r = (sh -c 'kill -SEGV $$')
r.ok
'''
value = "false"

# Curated teaching diagnostics for box-era spellings (site/content/internals/values-streams-execution.md): heredocs,
# here-strings, fd-numbered redirects, and the stream-merging redirect each
# parse-error with the *why* and the shoal replacement — they must never
# silently reparse as something else (`cmd 2> f` used to pass `2` as an
# argument and redirect STDOUT; `cmd &> f` used to become a comparison).
# See crates/shoal-syntax/src/parser/command.rs.

[[case]]
name = "box-heredoc-teaches-feed"
src = 'cat << EOF'
parse_error = true
parse_error_contains = "no heredocs"

[[case]]
name = "box-here-string-teaches-feed"
src = 'grep foo <<< "text"'
parse_error = true
parse_error_contains = "no here-strings"

[[case]]
name = "box-fd-redirect-teaches-stderr"
src = 'ls 2> /dev/null'
parse_error = true
parse_error_contains = "no fd-numbered redirects"

[[case]]
name = "box-fd-append-redirect-teaches-stderr"
src = 'ls 2>> log.txt'
parse_error = true
parse_error_contains = "no fd-numbered redirects"

[[case]]
name = "box-stream-merge-teaches-structured-capture"
src = 'ls &> out.txt'
parse_error = true
parse_error_contains = "no stream-merging redirect"

[[case]]
name = "box-spaced-digit-arg-is-still-a-plain-redirect"
# With a space, `2` is an ordinary argument and `>` a stdout redirect —
# only the GLUED `2>` form is the box-era fd spelling.
fixture = []
src = '''
echo 2 > sink.txt
path("sink.txt").read.trim()
'''
value = '"2"'

[[case]]
name = "env-assign-shape-is-a-plain-word-argument"
# `IDENT=rest` is an env-prefix only at head position (site/content/internals/language-conformance-contract.md); as an
# argument it is a bare word: `make CC=gcc`, `echo FOO=bar`.
src = '(echo FOO=bar).out.trim()'
value = '"FOO=bar"'

[[case]]
name = "env-assign-multiple-word-arguments"
src = '(echo a=b c=d).out.trim()'
value = '"a=b c=d"'

[[case]]
name = "record-literal-first-field-on-its-own-line"
# The record-vs-block probe must see past a newline after `{` — only the
# FIRST field was position-sensitive (later ones already newline-tolerant).
src = '''
let r = {
  a: 1, b: 2}
r.a + r.b
'''
value = "3"

[[case]]
name = "record-literal-every-field-on-its-own-line"
src = '''
let r = {
  a: 10,
  b: 20,
}
r.a + r.b
'''
value = "30"

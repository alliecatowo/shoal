# Reactive streams + in-language channels (site/content/internals/streams-channels.md, site/content/internals/roadmap-and-priorities.md).
#
# ONLY host-safe, deterministic cases live here: the timing sources
# (`watch`/`tail`/`every`) and the concurrent `channel().take`/`on(...)`
# machinery are non-deterministic and are unit-tested in `shoal-eval`
# (`crates/shoal-eval/tests/streams.rs`) instead. Every case below uses
# `.stream()` (a finite in-memory stream) or a fully-populated channel ring,
# so the combinators and sinks documented in
# `site/content/internals/streams-channels.md` run to a fixed value.

# --- combinators (site/content/internals/streams-channels.md), driven by the `.collect()` sink -------------

[[case]]
name = "stream-where-map"
src = '[1, 2, 3, 4, 5, 6].stream().where(x => x % 2 == 0).map(x => x * 10).collect()'
value = "[20, 40, 60]"

[[case]]
name = "stream-map-only"
src = '[1, 2, 3].stream().map(x => x + 1).collect()'
value = "[2, 3, 4]"

[[case]]
name = "stream-scan-running-sum"
src = '[1, 2, 3, 4].stream().scan(0, (a, x) => a + x).collect()'
value = "[1, 3, 6, 10]"

[[case]]
name = "stream-take"
src = '[1, 2, 3, 4, 5].stream().take(3).collect()'
value = "[1, 2, 3]"

[[case]]
name = "stream-take-until-pred"
src = '[1, 2, 3, 4, 5].stream().take_until(x => x == 4).collect()'
value = "[1, 2, 3]"

[[case]]
name = "stream-window-count"
src = '[1, 2, 3, 4].stream().window(2).collect()'
value = "[[1, 2], [2, 3], [3, 4]]"

[[case]]
name = "stream-window-count-has-hard-retention-limit"
src = '[1].stream().window(4097).collect()'
error = "arg_error"
error_contains = "between 1 and 4096"

[[case]]
name = "stream-dedupe"
src = '[1, 1, 2, 2, 2, 3, 1].stream().dedupe().collect()'
value = "[1, 2, 3, 1]"

[[case]]
name = "stream-distinct"
src = '[1, 1, 2, 2, 2, 3, 1].stream().distinct().collect()'
value = "[1, 2, 3]"

[[case]]
name = "stream-distinct-numeric-promotion-equality"
src = '[1, 1.0, 2, 1].stream().distinct().collect()'
value = "[1, 2]"

[[case]]
name = "stream-distinct-explicit-history-limit"
src = '[1, 1, 2, 3].stream().distinct(2).collect()'
error = "stream_distinct_limit"
error_contains = "2-value limit"

[[case]]
name = "stream-distinct-limit-must-be-positive"
src = '[1].stream().distinct(0).collect()'
error = "arg_error"
error_contains = "positive"

[[case]]
name = "stream-flat-map-lists"
src = '[1, 2, 3].stream().flat_map(x => [x, x * 10]).collect()'
value = "[1, 10, 2, 20, 3, 30]"

[[case]]
name = "large-range-streams-without-eager-materialization"
src = "(1..1000000).stream().take(3).collect()"
value = "[1, 2, 3]"

[[case]]
name = "bounded-stream-collection-has-hard-retention-limit"
src = "(0..16385).stream().collect()"
error = "stream_collect_limit"
error_contains = "16384-value limit"

[[case]]
name = "stream-flat-map-keeps-range-expansions-lazy"
src = "[0].stream().flat_map(_ => 1..1000000).take(3).collect()"
value = "[1, 2, 3]"

[[case]]
name = "stream-flat-map-substreams"
src = '[1, 2].stream().flat_map(x => [x].stream()).collect()'
value = "[1, 2]"

[[case]]
name = "stream-flat-map-substreams-drain-sequentially"
src = '[1, 2].stream().flat_map(x => [x * 10, x * 10 + 1].stream()).collect()'
value = "[10, 11, 20, 21]"

[[case]]
name = "stream-enumerate"
src = '["a", "b", "c"].stream().enumerate().collect()'
value = '[[0, "a"], [1, "b"], [2, "c"]]'

[[case]]
name = "stream-buffer-preserves-finite-values"
src = '[1, 2, 3].stream().buffer(2).collect()'
value = "[1, 2, 3]"

[[case]]
name = "stream-buffer-composes-with-closure-stages"
src = '[1, 2, 3].stream().map(x => x * 2).buffer(2).map(x => x + 1).collect()'
value = "[3, 5, 7]"

[[case]]
name = "stream-zip"
src = '[1, 2, 3].stream().zip([10, 20].stream()).collect()'
value = "[[1, 10], [2, 20]]"

[[case]]
name = "stream-zip-consumes-one-left-item-past-the-shorter-end"
src = '''
let pairs = [1, 2, 3].stream().map(x => { channel("pulled").emit(x)
x }).zip([10].stream()).collect()
[pairs, channel("pulled").latest()]
'''
value = "[[[1, 10]], 2]"

[[case]]
name = "stream-merge-sum"
src = '[1, 2].stream().merge([3, 4].stream()).sum()'
value = "10"

[[case]]
name = "stream-merge-ready-sources-round-robin"
src = '[1, 2].stream().merge([3, 4].stream()).collect()'
value = "[1, 3, 2, 4]"

[[case]]
name = "stream-throttle-finite-first"
src = '[1, 2, 3].stream().throttle(1s).collect()'
value = "[1]"

[[case]]
name = "stream-debounce-finite-last"
src = '[1, 2, 3].stream().debounce(1ms).collect()'
value = "[3]"

# --- sources: `.stream()` promotion ---------------------------------------

[[case]]
name = "stream-from-range"
src = '(1..5).stream().map(x => x * x).collect()'
value = "[1, 4, 9, 16]"

[[case]]
name = "stream-from-string-lines"
src = '"error: a\ninfo: b\nerror: c".stream().where(l => l.starts_with("error")).collect()'
value = '["error: a", "error: c"]'


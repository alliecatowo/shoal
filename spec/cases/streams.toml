# --- single-consumption + boundedness discipline (site/content/internals/streams-channels.md) ---------

[[case]]
name = "stream-single-consumption"
src = '''
let s = [1, 2, 3].stream()
s.collect()
s.collect()
'''
error = "stream_consumed"

[[case]]
name = "stream-collect-unbounded-errors"
src = 'channel("x").events().collect()'
error = "stream_unbounded"

# --- in-language channels (site/content/internals/streams-channels.md): emit / latest / events ------

[[case]]
name = "channel-emit-latest"
src = '''
channel("build").emit(1)
channel("build").emit(2)
channel("build").latest()
'''
value = "2"

[[case]]
name = "channel-latest-empty-is-null"
src = 'channel("nope").latest()'
value = "null"

[[case]]
name = "channel-events-replay-payloads"
src = '''
channel("z").emit("a")
channel("z").emit("b")
channel("z").events().map(ev => ev.payload).take(2).collect()
'''
value = '["a", "b"]'

[[case]]
name = "channel-events-since-cursor"
src = '''
channel("c").emit(10)
channel("c").emit(20)
channel("c").emit(30)
channel("c").events(since: 0).map(ev => ev.payload).take(2).collect()
'''
value = "[20, 30]"

[[case]]
name = "channel-event-record-shape"
src = '''
channel("q").emit(42)
channel("q").events().take(1).map(ev => ev.payload).first()
'''
value = "42"

[[case]]
name = "channel-event-seq-monotonic"
src = '''
channel("s").emit("x")
channel("s").emit("y")
channel("s").events().take(2).map(ev => ev.seq).collect()
'''
value = "[0, 1]"

# --- stream → channel sinks (site/content/internals/streams-channels.md): `.each`, `.into` -----------------

[[case]]
name = "stream-each-emits"
src = '''
[1, 2, 3].stream().each(x => channel("acc").emit(x))
channel("acc").latest()
'''
value = "3"

[[case]]
name = "stream-into-channel"
src = '''
[7, 8, 9].stream().into(channel("mirror"))
channel("mirror").latest()
'''
value = "9"

[[case]]
name = "stream-into-then-events"
src = '''
[1, 2].stream().into(channel("m"))
channel("m").events().map(ev => ev.payload).take(2).collect()
'''
value = "[1, 2]"

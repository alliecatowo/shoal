name = "stream-sum-sink"
src = '[1, 2, 3, 4].stream().sum()'
value = "10"

[[case]]
name = "stream-first-sink"
src = '[5, 6, 7].stream().first()'
value = "5"

[[case]]
name = "stream-len-sink"
src = '[1, 2, 3, 4, 5].stream().take(3).len()'

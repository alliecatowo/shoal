# reef-adjacent conformance: docs/REEF.md's design contract touches `which`,
# `env`, `cwd` ŌĆö machinery shoal-eval already owns. Most of REEF.md's actual
# surface (real resolved paths/hashes/providers, `.reef.toml` project-scope
# walks, `reef`/`reef lock`/`reef doctor`) is host- and install-state-
# dependent and/or not wired into shoal-eval yet (docs/REEF.md status:
# "crate built+tested; eval integration landing this wave") ŌĆö those are
# `skip`ped below with a reason instead of asserted, per spec/README's rule
# against environment-dependent expectations.
#
# What IS deterministic and headless, and what the reef wave must not
# regress, is asserted for real:
#   - `which`'s arity contract and its *structural* record shape (REEF.md
#     ┬¦6) for fields that don't depend on host tool inventory (`.name` only
#     echoes the query ŌĆö never the resolved path/hash/provider).
#   - `cwd`/`env` purity: REEF.md ┬¦1 leans on "`cd` re-scopes the next
#     resolution; nothing else changes" and TDD ┬¦4.6's restore-on-any-exit-
#     path guarantee for `with cwd:`/`with env:` ŌĆö reef's project-scope walk
#     is a pure function of these, so their correctness here is a
#     regression fence for the whole reef design, independent of reef
#     itself ever landing.

[[case]]
name = "reef-which-name-field-echoes-query"
# REEF.md ┬¦6: `which node` -> a record `{name, scope, constraint, version,
# path, hash, provider, chain}`. `.name` is the one field guaranteed
# host-independent ŌĆö it always echoes the query, never a resolved path.
src = '(which "sh").name'
value = '"sh"'

[[case]]
name = "reef-which-unresolved-tool-out-is-null"
# A tool name no host plausibly has resolves to `null` (via `.out`, since
# `which` is a builtin and outcome-unification wraps its result); this must
# not regress into an error once reef owns resolution.
src = '(which "definitely-not-a-real-binary-xyz-shoal-9f3a").out'
value = "null"

[[case]]
name = "reef-which-arity-error"
# `which` takes exactly one tool name (REEF.md ┬¦6's singular `which node`
# form) regardless of which provider ends up answering it.
src = 'which "a" "b"'
error = "arg_error"

[[case]]
name = "reef-cwd-restores-after-with-block"
# TDD ┬¦4.6: `with cwd: ŌĆ” { }` restores on any exit path. reef's project
# scope is "a pure function of (cwd, manifest files) ŌĆö no activation, no
# hooks, no env mutation, ever" (REEF.md ┬¦1); that purity depends on this.
src = "let before = pwd\nwith cwd: \"sub\" { }\nlet after = pwd\nbefore == after"
fixture = ["sub/.keep"]
value = "true"

[[case]]
name = "reef-cwd-restores-after-error-inside-with-block"
# Restoration happens even when the body raises (TDD ┬¦4.6 "restoring on any
# exit path") ŌĆö reef's re-scope-on-`cd` model would leak state without this.
src = "let before = pwd\ntry { with cwd: \"sub\" { 1 / 0 } } catch { null }\nlet after = pwd\nbefore == after"
fixture = ["sub/.keep"]
value = "true"

[[case]]
name = "reef-cwd-nested-with-blocks-restore-outer"
# Nested `with cwd:` composes: the inner path resolves relative to the
# outer's already-scoped cwd, and unwinding restores all the way out.
src = "let before = pwd\nwith cwd: \"a\" { with cwd: \"b\" { } }\nlet after = pwd\nbefore == after"
fixture = ["a/.keep", "a/b/.keep"]
value = "true"

[[case]]
name = "reef-cd-inside-fn-body-is-illegal"
# TDD ┬¦4.6: `cd` is illegal inside `fn` bodies (the fix-it names `with
# cwd:`) ŌĆö reef's "no activation, no hooks" model requires cwd changes to
# stay an explicit, session-top-level act, never a fn side effect.
src = "fn f() { cd \"sub\" }\nf()"
fixture = ["sub/.keep"]
error = "custom"
error_contains = "with cwd:"

[[case]]
name = "reef-env-assign-inside-fn-body-is-illegal"
# TDD ┬¦4.6: `env.NAME = v` is illegal inside `fn` bodies, same rule as `cd`.
# `env.NAME = v` as a dotted assignment target isn't accepted by the
# source-level parser yet (the assignment lookahead only recognizes a bare
# identifier head, not a `Field` target) ŌĆö only exercised via direct AST
# construction in shoal-eval's own unit test today. Spec-true; skip until
# the parser accepts a field-path assignment target.
src = "fn f() { env.FOO = \"x\" }\nf()"
error = "custom"
error_contains = "with env:"
skip = "env.NAME = v as a source-parsed assignment target isn't wired into shoal-syntax's assignment lookahead yet (dotted target only reachable via direct AST construction)"

[[case]]
name = "reef-env-with-block-sets-var-during"
# `with env: {ŌĆ”} { }` (TDD ┬¦4.6) is the dynamic-scoping primitive REEF.md
# ┬¦8's non-goals explicitly leave to the session, not reef, to own.
src = 'with env: {SHOAL_REEF_MARKER2: "set"} { (env SHOAL_REEF_MARKER2).out }'
value = '"set"'

[[case]]
name = "reef-env-with-block-restores-after"
src = "let before = (env SHOAL_REEF_MARKER3).out\nwith env: {SHOAL_REEF_MARKER3: \"set\"} { }\nlet after = (env SHOAL_REEF_MARKER3).out\nbefore == after"
value = "true"

[[case]]
name = "reef-which-full-chain-is-host-dependent"
# REEF.md ┬¦6's full record (`scope`, `version`, `path`, `hash`, `provider`,
# `chain`) reflects a real host's tool inventory (mise installs, system
# PATH, etc.) ŌĆö not reproducible across CI hosts.
src = 'which "node"'
skip = "which's resolved path/hash8/provider/chain for a real tool depend on the host's tool inventory (mise installs, system PATH) ŌĆö not reproducible across CI hosts"

[[case]]
name = "reef-binding-table-is-host-dependent"
# REEF.md ┬¦6: bare `reef` -> the current binding table (name, constraint,
# version, hash8, provider, scope) for every tool the session has resolved.
src = "reef"
skip = "the reef binding table enumerates whatever tools the host session has actually resolved ŌĆö inherently host-inventory-dependent, not a fixed corpus expectation"

[[case]]
name = "reef-with-reef-dynamic-scope-not-wired"
# REEF.md ┬¦6: `with reef: {node: "20"} { ŌĆ” }` ŌĆö dynamic scoping like `with
# cwd:`/`with env:`. `with` only carries `cwd`/`env` fields today (TDD
# ┬¦4.6); a `reef` field isn't parsed/evaluated by `Expr::With` yet.
src = 'with reef: {node: "20"} { }'
skip = "`with` only supports cwd/env fields today (TDD S4.6); reef dynamic scoping (REEF.md S6) isn't a recognized `with` field in shoal-eval yet"

[[case]]
name = "reef-project-scope-reef-toml-walk-not-wired"
# REEF.md ┬¦1: nearest `.reef.toml` walking up from cwd, a pure function of
# (cwd, manifest files) with no activation/hooks/env mutation. Exercising
# this for real needs actual provider binaries and a real manifest walk
# outcome on-disk, which shoal-eval doesn't perform yet (reef crate is
# built+tested per docs/REEF.md's status banner; eval integration is
# landing this wave, not necessarily finished by the time this corpus runs).
src = 'cd sub\nwhich "rg"'
skip = "nearest-.reef.toml project-scope resolution needs a real provider inventory and manifest walk; not wired into shoal-eval's which/resolution path as a corpus-checkable behavior yet"

[[case]]
name = "reef-lock-drift-detection-is-host-dependent"
# REEF.md ┬¦2: `reef.lock` records a blake3 of the resolved binary; a
# mismatch against the lock at spawn is `reef_drift`. Detecting drift for
# real requires a real on-disk binary whose hash varies by host/install.
src = "reef lock --refresh"
skip = "blake3 drift detection against a real on-disk binary is host- and install-state-dependent (REEF.md S2); not a fixed, reproducible corpus expectation"

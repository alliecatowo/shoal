# reef-adjacent conformance: docs/REEF.md's design contract touches `which`,
# `reef`/`reef doctor`, `env`, `cwd` — machinery shoal-eval now owns end to
# end. Most of REEF.md's surface is exercisable for real, host-independently,
# by having each case write its OWN `.reef.toml`/`reef.lock` fixtures on the
# fly (via `save(...)`) rather than depending on any real tool's install
# state — the only real external dependency any case here takes is `sh`
# (guaranteed present on any POSIX host, the same assumption `sh { … }`
# blocks elsewhere in this corpus already make). What's left `skip`ped below
# is genuinely host-inventory-dependent (a real `node`/mise install, an
# actual system binary's on-disk hash) and would not be a fixed, reproducible
# expectation across CI hosts, per spec/README's rule against
# environment-dependent expectations.
#
# What IS deterministic and headless, and what the reef wave must not
# regress, is asserted for real:
#   - `which`'s arity contract and its *structural* record shape (REEF.md
#     §6) for fields that don't depend on host tool inventory (`.name` only
#     echoes the query — never the resolved path/hash/provider), PLUS its
#     `unresolved: <code>` surfacing of a real conflict/drift instead of a
#     silently-swallowed ambient-PATH guess.
#   - `reef` (the binding table) and `reef doctor` (drift/orphan/shadowed-
#     ambient) against a manifest/lock the case writes itself.
#   - project-scope `.reef.toml` walk-up from a subdirectory.
#   - `run`'s bare-filename runner dispatch honoring the full runner table,
#     not a separately hand-maintained extension list.
#   - `cwd`/`env` purity: REEF.md §1 leans on "`cd` re-scopes the next
#     resolution; nothing else changes" and TDD §4.6's restore-on-any-exit-
#     path guarantee for `with cwd:`/`with env:` — reef's project-scope walk
#     is a pure function of these, so their correctness here is a
#     regression fence for the whole reef design, independent of reef
#     itself ever landing.

[[case]]
name = "reef-which-name-field-echoes-query"
# REEF.md §6: `which node` -> a record `{name, scope, constraint, version,
# path, hash, provider, chain}`. `.name` is the one field guaranteed
# host-independent — it always echoes the query, never a resolved path.
src = '(which "sh").name'
value = '"sh"'

[[case]]
name = "reef-which-unresolved-tool-out-is-null"
# A tool name no host plausibly has resolves to `null` (via `.out`, since
# `which` is a builtin and outcome-unification wraps its result); this must
# not regress into an error once reef owns resolution.
src = '(which "definitely-not-a-real-binary-xyz-shoal-9f3a").out'
value = "null"

[[case]]
name = "reef-which-arity-error"
# `which` takes exactly one tool name (REEF.md §6's singular `which node`
# form) regardless of which provider ends up answering it.
src = 'which "a" "b"'
error = "arg_error"

[[case]]
name = "reef-which-surfaces-conflict-not-ambient-fallback"
# The audit's single most user-misleading finding: `which` used to swallow
# EVERY resolver error and silently fall back to a bare ambient-PATH guess,
# so a hard `reef_conflict` (two scopes constraining one tool incompatibly,
# REEF.md §2) rendered exactly like an ordinary unconstrained lookup. Two
# `.reef.toml` scopes conflicting is a pure manifest-chain decision — no
# real tool install needed, so this is fully host-independent.
src = '''
save(".reef.toml", "[tools]\nfaketool = \"18\"\n")
save("sub/.reef.toml", "[tools]\nfaketool = \"22\"\n")
cd sub
(which "faketool").scope
'''
fixture = ["sub/.keep"]
value = '"unresolved: reef_conflict"'

[[case]]
name = "reef-which-surfaces-drift-not-ambient-fallback"
# Same fix, a different resolver error: a valid-but-drifted lock entry
# (hand-written, pointing at a fixture file whose bytes don't match the
# recorded hash) short-circuits `resolve()` before any provider is ever
# consulted, so this needs no real tool either.
src = '''
let root = pwd
save(".reef.toml", "[tools]\nfaketool = \"*\"\n")
save("fakebin", "original-bytes")
save("reef.lock", "[tool.faketool]\nname = \"faketool\"\nversion = \"1.0.0\"\nprovider = \"mise\"\npath = \"{root}/fakebin\"\nblake3 = \"deadbeef\"\nresolved_at = \"2026-01-01T00:00:00Z\"\n")
(which "faketool").scope
'''
value = '"unresolved: reef_drift"'

[[case]]
name = "reef-binding-table-lists-a-self-constrained-tool"
# REEF.md §6: bare `reef` -> the binding table for every constrained tool.
# Each conformance case gets its own fresh tempdir + Evaluator, so nothing
# here is "whatever the host session happened to resolve" (the stale
# reasoning this case used to carry, back when it was skipped) —
# constraining `sh` makes the binding table fully self-contained.
#
# Filtered by name (`.where(.name == "sh").first()`) rather than a bare
# `.first()`: `ScopeChain::discover` (REEF.md §1) walks from the fresh
# tempdir all the way to the filesystem root collecting every
# `.reef.toml`/`mise.toml`/`.mise.toml`/`.tool-versions` it finds along the
# way, so on a host whose ancestor tree happens to constrain some OTHER
# tool too (an ambient ~/mise.toml, a stray manifest left in a shared /tmp,
# etc.), the binding table can legitimately grow extra rows that sort
# ahead of "sh" alphabetically. Naming the row we actually asserted about
# makes this deterministic regardless of what else is in scope, without
# weakening what the case actually checks (that `sh`'s own row reports
# scope "reef").
src = '''
save(".reef.toml", "[tools]\nsh = \"*\"\n")
(reef).where(.name == "sh").first().scope
'''
value = '"reef"'

[[case]]
name = "reef-doctor-detects-drift-against-a-hand-written-lock"
# REEF.md §2/§6: a lock entry's blake3 must match the on-disk binary; a
# mismatch is drift, and `reef doctor` surfaces it per-tool. The lock entry
# here is hand-written by the case itself (not a real system binary's lock),
# so this is fully host-independent — the drift comes from a deliberately
# wrong recorded hash against a fixture file this case also writes, not from
# any real tool's install state.
src = '''
let root = pwd
save(".reef.toml", "[tools]\nfaketool = \"*\"\n")
save("fakebin", "some-content")
save("reef.lock", "[tool.faketool]\nname = \"faketool\"\nversion = \"1.0.0\"\nprovider = \"mise\"\npath = \"{root}/fakebin\"\nblake3 = \"deadbeef\"\nresolved_at = \"2026-01-01T00:00:00Z\"\n")
(reef doctor).first().status
'''
value = '"drift"'

[[case]]
name = "reef-doctor-detects-orphan-lock"
# REEF.md §6: `reef doctor` flags orphan locks — a `reef.lock` entry no
# manifest in scope mentions anymore (e.g. removed from `.reef.toml` after
# being locked). Hand-written manifest/lock, so this needs no real tool
# inventory.
src = '''
save(".reef.toml", "[tools]\nsh = \"*\"\n")
save("reef.lock", "[tool.ghosttool]\nname = \"ghosttool\"\nversion = \"1.0.0\"\nprovider = \"mise\"\npath = \"/nonexistent/ghosttool\"\nblake3 = \"deadbeef\"\nresolved_at = \"2026-01-01T00:00:00Z\"\n")
(reef doctor).where(.check == "orphan").first().name
'''
value = '"ghosttool"'

[[case]]
name = "reef-doctor-detects-shadowed-ambient"
# REEF.md §6's third bullet: a constrained, locked name that ALSO resolves,
# to a DIFFERENT binary, via plain ambient PATH. `sh` is locked to a fixture
# file here; the REAL ambient `sh` (guaranteed present, same assumption the
# rest of this corpus already makes) is a different path, so it's flagged
# as shadowed.
src = '''
let root = pwd
save(".reef.toml", "[tools]\nsh = \"*\"\n")
save("fake-sh", "not a real shell")
save("reef.lock", "[tool.sh]\nname = \"sh\"\nversion = \"1.0.0\"\nprovider = \"mise\"\npath = \"{root}/fake-sh\"\nblake3 = \"deadbeef\"\nresolved_at = \"2026-01-01T00:00:00Z\"\n")
(reef doctor).where(.check == "shadowed_ambient").first().name
'''
value = '"sh"'

[[case]]
name = "reef-run-bare-filename-honors-full-runner-table"
# script.rs's `run_poly` scripty gate used to hardcode `{shl,sh,py,js,rs}` —
# a bare `run x.rb` (no `./`) misrouted to command-not-found even though
# `RunnerTable::defaults()` has known this extension all along, and
# `run ./x.rb` (a path literal) resolved the SAME file correctly. Remapping
# `rb` to `sh` in this fixture's own manifest keeps the assertion
# host-independent (no real ruby install needed) — the point is proving the
# bare name reached the runner machinery, not that ruby is present.
src = '''
save(".reef.toml", "[tools]\nplaceholder = \"*\"\n\n[runners]\nrb = \"sh\"\n")
save("x.rb", "echo bare-rb-ran")
run("x.rb").out
'''
value = '"bare-rb-ran"'

[[case]]
name = "reef-cwd-restores-after-with-block"
# TDD §4.6: `with cwd: … { }` restores on any exit path. reef's project
# scope is "a pure function of (cwd, manifest files) — no activation, no
# hooks, no env mutation, ever" (REEF.md §1); that purity depends on this.
src = "let before = pwd\nwith cwd: \"sub\" { }\nlet after = pwd\nbefore == after"
fixture = ["sub/.keep"]
value = "true"

[[case]]
name = "reef-cwd-restores-after-error-inside-with-block"
# Restoration happens even when the body raises (TDD §4.6 "restoring on any
# exit path") — reef's re-scope-on-`cd` model would leak state without this.
src = "let before = pwd\ntry { with cwd: \"sub\" { 1 / 0 } } catch { null }\nlet after = pwd\nbefore == after"
fixture = ["sub/.keep"]
value = "true"

[[case]]
name = "reef-cwd-nested-with-blocks-restore-outer"
# Nested `with cwd:` composes: the inner path resolves relative to the
# outer's already-scoped cwd, and unwinding restores all the way out.
src = "let before = pwd\nwith cwd: \"a\" { with cwd: \"b\" { } }\nlet after = pwd\nbefore == after"
fixture = ["a/.keep", "a/b/.keep"]
value = "true"

[[case]]
name = "reef-cd-inside-fn-body-is-illegal"
# TDD §4.6: `cd` is illegal inside `fn` bodies (the fix-it names `with
# cwd:`) — reef's "no activation, no hooks" model requires cwd changes to
# stay an explicit, session-top-level act, never a fn side effect.
src = "fn f() { cd \"sub\" }\nf()"
fixture = ["sub/.keep"]
error = "custom"
error_contains = "with cwd:"

[[case]]
name = "jump-inside-fn-body-is-illegal"
# `j`/`jump` is a session-cwd mutation, exactly like `cd`, so it is illegal
# inside a `fn` body for the same reason (the fix-it names `with cwd:`). This
# guard fires before any frecency-store I/O, so the case is host-independent.
src = "fn f() { jump \"x\" }\nf()"
error = "custom"
error_contains = "with cwd:"

[[case]]
name = "jump-takes-at-most-one-query"
# `j`/`jump` accepts an optional single query. A second argument is an
# arg_error, caught before the store is ever consulted (host-independent).
src = "jump \"a\" \"b\""
error = "arg_error"
error_contains = "at most one query"

[[case]]
name = "reef-env-assign-inside-fn-body-is-illegal"
# TDD §4.6: `env.NAME = v` is illegal inside `fn` bodies, same rule as `cd`.
# The assignment lookahead now accepts a `Field` target rooted at `env`
# (a single dotted hop), so this is source-parsed for real.
src = "fn f() { env.FOO = \"x\" }\nf()"
error = "custom"
error_contains = "with env:"

[[case]]
name = "reef-env-assign-writes-session-env-for-a-child"
# TDD §4.6: `env.NAME = v` at session top level is a legal, journaled write
# that a subsequently spawned child observes — the sourced counterpart of
# defect11_env_assignment_writes_session_env's direct-AST unit test.
src = "env.SHOAL_REEF_ENV_ASSIGN = \"via-assign\"\nsh { printf '%s' \"$SHOAL_REEF_ENV_ASSIGN\" }.out"
value = '"via-assign"'

[[case]]
name = "reef-env-with-block-sets-var-during"
# `with env: {…} { }` (TDD §4.6) is the dynamic-scoping primitive REEF.md
# §8's non-goals explicitly leave to the session, not reef, to own.
src = 'with env: {SHOAL_REEF_MARKER2: "set"} { (env SHOAL_REEF_MARKER2).out }'
value = '"set"'

[[case]]
name = "reef-env-with-block-restores-after"
src = "let before = (env SHOAL_REEF_MARKER3).out\nwith env: {SHOAL_REEF_MARKER3: \"set\"} { }\nlet after = (env SHOAL_REEF_MARKER3).out\nbefore == after"
value = "true"

[[case]]
name = "reef-which-full-chain-is-host-dependent"
# REEF.md §6's full record (`scope`, `version`, `path`, `hash`, `provider`,
# `chain`) reflects a real host's tool inventory (mise installs, system
# PATH, etc.) — not reproducible across CI hosts. (Unlike the
# conflict/drift `which` cases above, which construct their own resolver
# error out of hand-written fixtures, `node` here is a real, arbitrary
# language runtime whose presence/version this corpus cannot control.)
src = 'which "node"'
skip = "which's resolved path/hash8/provider/chain for a real tool depend on the host's tool inventory (mise installs, system PATH) — not reproducible across CI hosts"

[[case]]
name = "reef-with-reef-dynamic-scope-parses-and-evals"
# REEF.md §6: `with reef: {node: "20"} { … }` — dynamic scoping like `with
# cwd:`/`with env:`. `Expr::With` now carries an additive `reef` field the
# parser/evaluator both wire up; an empty body is a pure no-op that just
# yields the block's (null) value.
src = 'with reef: {node: "20"} { }'
value = "null"

[[case]]
name = "reef-with-reef-constrains-a-spawn-inside-the-block"
# The override layer REEF.md §6 describes is highest-priority scope: a spawn
# head it constrains resolves through the override exactly like a real
# manifest would. Script policy (non-interactive) treats a constrained-but-
# unlocked tool as a hard `reef_unlocked` error (resolve.rs) rather than
# ever falling back to an ambient-PATH lookup — deterministic proof the
# override chain is actually consulted, not just parsed, since a bare
# command-not-found would instead surface plain `not_found`.
src = 'with reef: {"shoal-reef-fake-tool-9f3a": "1"} { ^shoal-reef-fake-tool-9f3a }'
error = "reef_unlocked"

[[case]]
name = "reef-with-reef-restores-after-block"
# TDD §4.6's restore-on-any-exit-path guarantee, extended to `with reef:`
# (REEF.md §6): once the block exits, the override no longer constrains the
# same head, so the same spawn now fails as an ordinary missing command
# (`not_found`), not `reef_not_found`.
src = "with reef: {\"shoal-reef-fake-tool-9f3a\": \"1\"} { }\n^shoal-reef-fake-tool-9f3a"
error = "not_found"

[[case]]
name = "reef-project-scope-reef-toml-walk-up-is-wired"
# REEF.md §1: nearest `.reef.toml` walking up from cwd, a pure function of
# (cwd, manifest files) with no activation/hooks/env mutation. `sh`
# constrained at the root is discovered from a subdirectory — proof the
# walk-up itself (not just same-directory discovery) is wired, without
# depending on any tool inventory beyond `sh`.
src = '''
save(".reef.toml", "[tools]\nsh = \"*\"\n")
cd sub
(which "sh").scope
'''
fixture = ["sub/.keep"]
value = '"reef"'

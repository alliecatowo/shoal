# Literal forms: ints (dec/hex/octal/binary, underscores), floats, bools, null,
# size units (decimal + binary), duration units, time literals, regex, glob/path
# constructors. Render expectations per site/content/internals/intercrate-protocol-contracts.md.

[[case]]
name = "lit-int-decimal"
src = "42"
value = "42"

[[case]]
name = "lit-int-underscores"
src = "1_000_000"
value = "1000000"

[[case]]
name = "lit-int-hex"
src = "0xFF"
value = "255"

[[case]]
name = "lit-int-hex-underscore"
src = "0xFF_FF"
value = "65535"

[[case]]
name = "lit-int-octal"
src = "0o755"
value = "493"

[[case]]
name = "lit-int-binary"
src = "0b1010"
value = "10"

[[case]]
name = "lit-int-negative"
src = "-7"
value = "-7"

[[case]]
name = "lit-float-simple"
src = "3.14"
value = "3.14"

[[case]]
name = "lit-float-exponent"
src = "1e9"
value = "1000000000"

[[case]]
name = "lit-float-fraction"
src = "0.5"
value = "0.5"

[[case]]
name = "lit-bool-true"
src = "true"
value = "true"

[[case]]
name = "lit-bool-false"
src = "false"
value = "false"

[[case]]
name = "lit-null"
src = "null"
value = "null"

[[case]]
name = "lit-size-bytes"
src = "237b"
value = "237b"

[[case]]
name = "lit-size-kb"
src = "1kb"
value = "1kb"

[[case]]
name = "lit-size-render-two-decimals"
src = "1020b"
value = "1.02kb"

[[case]]
name = "lit-size-mb-frac"
src = "1.5mb"
value = "1.5mb"

[[case]]
name = "lit-size-gb-frac"
src = "1.5gb"
value = "1.5gb"

[[case]]
name = "lit-size-tb"
src = "2tb"
value = "2tb"

[[case]]
name = "lit-size-underscore-unit"
src = "1_000kb"
value = "1mb"

[[case]]
name = "lit-size-kib-binary-renders-decimal"
# kib family renders in decimal units in v1 (site/content/internals/intercrate-protocol-contracts.md): 1024 bytes = 1.024kb -> 1.02kb.
src = "1kib"
value = "1.02kb"

[[case]]
name = "lit-size-kib-4096"
# 4096 bytes = 4.096kb -> two decimals, trailing zeros trimmed -> 4.1kb.
src = "4kib"
value = "4.1kb"

[[case]]
name = "lit-size-sub-unit-fraction"
# 0.5kb = 500 bytes; largest unit with integer part >= 1 is bytes.
src = "0.5kb"
value = "500b"

[[case]]
name = "lit-duration-ms"
src = "250ms"
value = "250ms"

[[case]]
name = "lit-duration-zero"
src = "0s"
value = "0s"

[[case]]
name = "lit-duration-compound-seconds"
src = "90s"
value = "1m30s"

[[case]]
name = "lit-duration-frac-hour"
src = "1.5h"
value = "1h30m"

[[case]]
name = "lit-duration-frac-second"
src = "1.5s"
value = "1s500ms"

[[case]]
name = "lit-duration-weeks"
# 30d = 4 weeks + 2 days; render uses w d h m s ms us ns, nonzero parts only.
src = "30d"
value = "4w2d"

[[case]]
name = "lit-duration-minutes"
src = "90m"
value = "1h30m"

[[case]]
name = "lit-duration-micros"
src = "1500us"
value = "1ms500us"

[[case]]
name = "lit-duration-day-hour"
src = "36h"
value = "1d12h"

[[case]]
name = "lit-time-am"
src = "10:00am"
value = "10:00"

[[case]]
name = "lit-time-24h"
src = "23:15"
value = "23:15"

[[case]]
name = "lit-time-pm-with-seconds"
src = "10:30:15pm"
value = "22:30:15"

[[case]]
name = "lit-time-pad-hour"
src = "9:05am"
value = "09:05"

[[case]]
name = "lit-regex-render"
src = 're"\d+"'
value = 're"\d+"'

[[case]]
name = "lit-datetime-render"
src = 't"2026-07-09T14:00Z"'
value = "2026-07-09T14:00:00Z"

[[case]]
name = "lit-glob-constructor-render"
# glob renders as its pattern (site/content/internals/intercrate-protocol-contracts.md).
src = 'glob("*.rs")'
value = "*.rs"

[[case]]
name = "lit-path-constructor-render"
# path renders lossy, unquoted when it contains no spaces (site/content/internals/intercrate-protocol-contracts.md).
src = 'path("a.txt")'
value = "a.txt"

[[case]]
name = "lit-int-zero"
src = "0"
value = "0"

[[case]]
name = "lit-size-zero-bytes"
# "0b" alone collides with the 0b<binary-digits> integer prefix (site/content/internals/language-conformance-contract.md); use an
# unambiguous zero-size literal and check the render is still the bytes unit.
src = "0kb"
value = "0b"

[[case]]
name = "lit-duration-negative"
# unary `-` on a duration literal (EBNF: unary = ("!"|"-") unary).
src = "-90s"
value = "-1m30s"

[[case]]
name = "lit-time-single-digit-hour"
# \d{1,2}:\d{2} — a single leading digit is legal; render always zero-pads (site/content/internals/intercrate-protocol-contracts.md).
src = "0:00"
value = "00:00"

[[case]]
name = "lit-glob-ctor-hidden-flag-still-renders-pattern"
# site/content/internals/language-conformance-contract.md: glob("…", hidden: true, follow: false) is the explicit constructor;
# render is always just the pattern regardless of hidden/follow (site/content/internals/intercrate-protocol-contracts.md).
src = 'glob("*.rs", hidden: true)'
value = "*.rs"

[[case]]
name = "lit-regex-render-escaped-dot"
# regex is raw/verbatim inside the tag — the backslash is preserved as-is.
src = 're"a\.b"'
value = 're"a\.b"'

[[case]]
name = "lit-size-mib-frac-renders-decimal"
# 4mib = 4*2^20 = 4194304 bytes = 4.194304mb -> two decimals -> 4.19mb.
src = "4mib"
value = "4.19mb"

[[case]]
name = "lit-size-gib-frac-renders-decimal"
# 1gib = 2^30 = 1073741824 bytes = 1.073741824gb -> 1.07gb.
src = "1gib"
value = "1.07gb"

# Dogfood papercuts (language behavior in
# `site/content/internals/language-conformance-contract.md`; method dispatch in
# `site/content/internals/intercrate-protocol-contracts.md`): `path` was bytes-backed navigation
# data with almost no methods of its own — every "is this a file, how big,
# what's its name" question forced a detour through `stat`/`cat`. This file
# covers the two halves of the fix:
#
#   - pure path-component accessors (no IO): `.name` `.stem` `.ext` `.parent`
#     `.join` `.abs` — `crates/shoal-value/src/methods/path.rs`.
#   - filesystem-backed path methods (route through the `Fs` port, resolve
#     relative paths against session cwd): `.read` `.lines` `.exists`
#     `.is_dir` `.is_file` `.size` — `crates/shoal-eval/src/expr_access.rs`.
#
# `path("…")` (site/content/internals/language-conformance-contract.md constructor surface) builds a `path` value directly
# from a str, unjoined to cwd — the cleanest way to get a `path` value in a
# case without going through glob expansion's cwd-absolutization (fs-
# builtins.toml's determinism note).

# --- .name / .stem / .ext (pure, lossy str; null when absent) --------------

[[case]]
name = "pathm-name-is-the-final-component"
fixture = ["sub/b.log"]
src = 'path("sub/b.log").name()'
value = '"b.log"'

[[case]]
name = "pathm-name-of-bare-filename-is-itself"
fixture = ["a.txt"]
src = 'path("a.txt").name()'
value = '"a.txt"'

[[case]]
name = "pathm-stem-drops-the-extension"
fixture = ["sub/b.log"]
src = 'path("sub/b.log").stem()'
value = '"b"'

[[case]]
name = "pathm-ext-has-no-leading-dot"
fixture = ["sub/b.log"]
src = 'path("sub/b.log").ext()'
value = '"log"'

[[case]]
name = "pathm-ext-of-extensionless-name-is-null"
fixture = ["README"]
src = 'path("README").ext()'
value = "null"

[[case]]
name = "pathm-stem-of-extensionless-name-is-the-whole-name"
fixture = ["README"]
src = 'path("README").stem()'
value = '"README"'

# --- .parent (pure; null at a bare name / fs root) --------------------------

[[case]]
name = "pathm-parent-of-nested-path-is-its-directory"
fixture = ["sub/b.log"]
src = 'path("sub/b.log").parent()'
value = "sub"

[[case]]
name = "pathm-parent-of-a-bare-name-is-null"
# std `Path::parent` of a bare relative name is `Some("")`, not `None` — the
# accessor collapses that empty-path case to `null` (site/content/internals/intercrate-protocol-contracts.md) so callers
# don't have to special-case an empty-but-not-null path.
fixture = ["a.txt"]
src = 'path("a.txt").parent()'
value = "null"

[[case]]
name = "pathm-parent-chain-reaches-the-top"
fixture = ["a/b/c.txt"]
src = 'path("a/b/c.txt").parent().parent().display()'
value = '"a"'

# --- .join (pure; str or path segment) --------------------------------------

[[case]]
name = "pathm-join-appends-a-str-segment"
src = 'path("a").join("b.txt").display()'
value = '"a/b.txt"'

[[case]]
name = "pathm-join-appends-a-path-segment"
src = 'path("a").join(path("b.txt")).display()'
value = '"a/b.txt"'

[[case]]
name = "pathm-join-rejects-a-non-path-non-str-segment"
src = "path(\"a\").join(1)"
error = "type_error"

# --- .abs (pure; absolutize against session cwd) ----------------------------

[[case]]
name = "pathm-abs-of-relative-path-ends-with-the-relative-tail"
# Absolutizing bakes in the per-run temp-dir prefix, so only the tail is safe
# to assert directly (same discipline as fs-builtins.toml's determinism note).
src = 'path("a.txt").abs().display().ends_with("a.txt")'
value = "true"

[[case]]
name = "pathm-abs-of-already-absolute-path-is-unchanged"
src = 'path("/tmp/x.txt").abs().display()'
value = '"/tmp/x.txt"'

# --- .exists / .is_dir / .is_file (filesystem-backed) -----------------------

[[case]]
name = "pathm-exists-true-for-a-fixture-file"
fixture = ["a.txt"]
src = 'path("a.txt").exists()'
value = "true"

[[case]]
name = "pathm-exists-false-for-a-missing-path"
src = 'path("nope.txt").exists()'
value = "false"

[[case]]
name = "pathm-is-dir-true-for-a-fixture-directory"
fixture = ["sub/b.log"]
src = 'path("sub").is_dir()'
value = "true"

[[case]]
name = "pathm-is-dir-false-for-a-file"
fixture = ["sub/b.log"]
src = 'path("sub/b.log").is_dir()'
value = "false"

[[case]]
name = "pathm-is-file-true-for-a-fixture-file"
fixture = ["sub/b.log"]
src = 'path("sub/b.log").is_file()'
value = "true"

[[case]]
name = "pathm-is-file-false-for-a-directory"
fixture = ["sub/b.log"]
src = 'path("sub").is_file()'
value = "false"

[[case]]
name = "pathm-is-dir-false-for-a-missing-path"
src = 'path("nope").is_dir()'
value = "false"

[[case]]
name = "pathm-is-file-false-for-a-missing-path"
src = 'path("nope").is_file()'
value = "false"

[[case]]
name = "pathm-exists-takes-no-arguments"
src = 'path("a.txt").exists("x")'
error = "arg_error"

# --- .size (filesystem-backed; render rules SIZE.md via site/content/internals/intercrate-protocol-contracts.md) ------

[[case]]
name = "pathm-size-of-a-saved-file"
src = '''
"hello".save("f.txt")
path("f.txt").size()
'''
value = "5b"

[[case]]
name = "pathm-size-of-an-empty-touched-file"
src = '''
touch f.txt
path("f.txt").size()
'''
value = "0b"

[[case]]
name = "pathm-size-of-a-missing-path-is-not-found"
src = 'path("nope.txt").size()'
error = "not_found"

# --- .read / .lines (filesystem-backed) -------------------------------------

[[case]]
name = "pathm-read-returns-file-contents-as-str"
src = '''
"hello world".save("f.txt")
path("f.txt").read()
'''
value = '"hello world"'

[[case]]
name = "pathm-read-of-a-missing-path-is-not-found"
src = 'path("nope.txt").read()'
error = "not_found"

[[case]]
name = "pathm-lines-splits-on-newlines"
src = '''
"line1\nline2\nline3".save("multi.txt")
path("multi.txt").lines()
'''
value = '["line1", "line2", "line3"]'

[[case]]
name = "pathm-lines-of-a-single-line-file"
src = '''
"only".save("one.txt")
path("one.txt").lines()
'''
value = '["only"]'

[[case]]
name = "pathm-lines-strips-trailing-cr"
# site/content/internals/language-conformance-contract.md: `.lines()` strips `\r?\n` — the filesystem-backed path variant
# honors the same rule as the str method it mirrors.
src = '''
"a\r\nb".save("crlf.txt")
path("crlf.txt").lines()
'''
value = '["a", "b"]'

[[case]]
name = "pathm-read-then-str-methods-compose"
src = '''
"  padded  ".save("f.txt")
path("f.txt").read().trim()
'''
value = '"padded"'

# --- glob(...) as a collection value (site/content/internals/language-conformance-contract.md, site/content/internals/intercrate-protocol-contracts.md) --------------

[[case]]
name = "pathm-glob-value-len-counts-matches"
fixture = ["a.txt", "b.txt"]
src = 'glob("*.txt").len()'
value = "2"

[[case]]
name = "pathm-glob-value-len-excludes-dotfiles-by-default"
fixture = [".hidden.txt", "a.txt"]
src = 'glob("*.txt").len()'
value = "1"

[[case]]
name = "pathm-glob-value-hidden-true-includes-dotfiles"
fixture = [".hidden.txt", "a.txt"]
src = 'glob("*.txt", hidden: true).len()'
value = "2"

[[case]]
name = "pathm-glob-value-map-extracts-names"
fixture = ["a.txt", "b.txt"]
src = 'glob("*.txt").map(p => p.name())'
value = '["a.txt", "b.txt"]'

[[case]]
name = "pathm-glob-value-first-is-sorted-lexically"
fixture = ["b.txt", "a.txt"]
src = 'glob("*.txt").first().name()'
value = '"a.txt"'

[[case]]
name = "pathm-glob-value-where-then-len"
fixture = ["a.txt", "b.log"]
src = 'glob("*").where(p => p.ext() == "txt").len()'
value = "1"

[[case]]
name = "pathm-glob-value-no-matches-is-an-empty-list"
src = 'glob("*.nonexistent-ext-zzz").len()'
value = "0"

[[case]]
name = "pathm-glob-pattern-accessor-returns-the-source-pattern"
src = 'glob("*.txt").pattern()'
value = '"*.txt"'

[[case]]
name = "pathm-glob-expand-yields-a-list"
fixture = ["a.txt"]
src = 'glob("*.txt").expand().len()'
value = "1"

# --- for-in over a glob value (site/content/internals/language-conformance-contract.md: iterating a glob expands matches) --

[[case]]
name = "pathm-for-in-glob-counts-matches"
fixture = ["a.txt", "b.txt", "c.log"]
src = '''
var n = 0
for p in glob("*.txt") { n += 1 }
n
'''
value = "2"

[[case]]
name = "pathm-for-in-glob-binds-each-path"
fixture = ["a.txt", "b.txt"]
src = '''
var names = []
for p in glob("*.txt") { names = names + [p.name()] }
names
'''
value = '["a.txt", "b.txt"]'

[[case]]
name = "pathm-for-in-glob-excludes-dotfiles"
fixture = [".hidden.txt", "a.txt"]
src = '''
var n = 0
for p in glob("*.txt") { n += 1 }
n
'''
value = "1"

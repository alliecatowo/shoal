# --- coercion matrix (site/content/internals/language-conformance-contract.md): arithmetic promotion -----------------------

[[case]]
name = "methc-coerce-int-float-mixed-arithmetic"
src = "2 + 3.5"
value = "5.5"

[[case]]
name = "methc-coerce-size-plus-size"
src = "1kb + 500b"
value = "1.5kb"

[[case]]
name = "methc-coerce-size-times-int"
src = "3 * 1.5kb"
value = "4.5kb"

[[case]]
name = "methc-coerce-size-div-int"
src = "1mb / 2"
value = "500kb"

[[case]]
name = "methc-coerce-size-div-size-yields-float-ratio"
src = "1mb / 1kb"
value = "1000"

[[case]]
name = "methc-coerce-duration-plus-duration"
src = "2s + 500ms"
value = "2s500ms"

[[case]]
name = "methc-coerce-int-div-int-truncates"
src = "10 / 3"
value = "3"

[[case]]
name = "methc-coerce-float-div-int-promotes"
src = "10.0 / 3"
value = "3.3333333333333335"

# --- misc: nullish coalescing, range render, str() error on mixed list -----

[[case]]
name = "methc-nullish-coalesce-falls-through-on-null"
src = "null ?? 5"
value = "5"

[[case]]
name = "methc-inclusive-range-renders-with-eq-sign"
src = "1..=3"
value = "1..=3"

[[case]]
name = "methc-str-on-a-mixed-list-is-a-type-error"
# `.str()` is a `str`/`path`/`bytes` conversion (site/content/internals/language-conformance-contract.md) — a `list` has no
# lossless string form, so it is a type error rather than a silent render.
src = '[1, "a", true, null].str()'
error = "type_error"

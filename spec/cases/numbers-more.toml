# Further int/float edge cases beyond numbers.toml's overflow/div/rem pass:
# i64::MIN boundary literals and arithmetic, round-half-away-from-zero for
# BOTH sign floors near a `.5` boundary, floor/ceil sign behavior, and
# int<->float cross-type equality (arithmetic promotion makes `5 == 5.0`
# true, per `site/content/internals/language-conformance-contract.md`). Every value cross-checked against the real
# evaluator via the conformance harness.

[[case]]
name = "num2-int-min-literal-out-of-range-is-parse-error"
# The bare digit run `9223372036854775808` overflows i64::MAX as a positive
# token BEFORE unary minus applies, so even i64::MIN's own literal spelling
# is a parse-time error, not an eval-time `overflow`.
src = "-9223372036854775808"
parse_error = true

[[case]]
name = "num2-int-min-reachable-via-subtraction"
# i64::MIN is reachable via arithmetic that never spells its literal digits
# directly: MAX's negation minus one more.
src = "-9223372036854775807 - 1"
value = "-9223372036854775808"

[[case]]
name = "num2-int-min-minus-one-more-overflows"
src = "(-9223372036854775807 - 1) - 1"
error = "overflow"

[[case]]
name = "num2-float-round-half-away-from-zero-positive"
src = "(2.5).round()"
value = "3"

[[case]]
name = "num2-float-round-half-away-from-zero-negative"
src = "(-2.5).round()"
value = "-3"

[[case]]
name = "num2-float-floor-negative-rounds-down"
src = "(-3.5).floor()"
value = "-4"

[[case]]
name = "num2-float-ceil-negative-rounds-up"
src = "(-3.5).ceil()"
value = "-3"

[[case]]
name = "num2-float-round-negative-half"
src = "(-3.5).round()"
value = "-4"

[[case]]
name = "num2-int-equals-float-via-promotion"
src = "5 == 5.0"
value = "true"

[[case]]
name = "num2-float-equals-int-via-promotion"
src = "5.0 == 5"
value = "true"

[[case]]
name = "num2-int-div-negative-dividend-positive-divisor"
src = "-5 / 2"
value = "-2"

[[case]]
name = "num2-int-div-positive-dividend-negative-divisor"
src = "5 / -2"
value = "-2"

[[case]]
name = "num2-int-div-both-negative"
src = "-5 / -2"
value = "2"

[[case]]
name = "num2-int-rem-both-negative"
src = "-5 % -2"
value = "-1"

[[case]]
name = "num2-int-rem-by-zero-is-div-zero"
src = "5 % 0"
error = "div_zero"

# `.round(n)`/`.floor(n)`/`.ceil(n)` round to `n` decimal places — the argument
# used to be silently ignored (always integer-rounded). No arg / `n = 0` still
# means nearest integer. Ints pass through at any precision.
# See crates/shoal-value/src/methods/num.rs::round_to.

[[case]]
name = "num-round-two-decimals"
src = '(3.14159).round(2)'
value = "3.14"

[[case]]
name = "num-round-three-decimals"
src = '(22.0 / 7.0).round(3)'
value = "3.143"

[[case]]
name = "num-round-zero-precision-is-integer"
src = '(3.7).round(0)'
value = "4"

[[case]]
name = "num-floor-two-decimals"
src = '(3.14159).floor(2)'
value = "3.14"

[[case]]
name = "num-ceil-two-decimals"
src = '(3.14159).ceil(2)'
value = "3.15"

[[case]]
name = "num-round-int-unchanged-at-precision"
src = '(42).round(3)'
value = "42"

# A large precision `n` used to make `10^n` (or `x * 10^n`) overflow f64 to
# ±inf, silently turning a finite input into `nan`/`inf`. Rounding a finite
# float to more decimal places than it can represent is the IDENTITY, so the
# value must come back unchanged and finite.
# See crates/shoal-value/src/methods/num.rs::round_to.

[[case]]
name = "num-round-huge-precision-is-identity"
src = '(1.23456).round(400)'
value = "1.23456"

[[case]]
name = "num-floor-huge-precision-is-identity"
src = '(1.5).floor(400)'
value = "1.5"

[[case]]
name = "num-ceil-huge-precision-is-identity"
src = '(123.456).ceil(999)'
value = "123.456"

# Duration arithmetic is CHECKED like int/size: unchecked ops used to PANIC
# the whole process (fatal in a kernel-hosted eval) instead of raising
# `overflow`. See crates/shoal-value/src/ops.rs.

[[case]]
name = "num-duration-add-overflow-raises"
src = '4000000000w + 4000000000w'
error = "overflow"

[[case]]
name = "num-duration-sub-overflow-raises"
src = '(0s - 4000000000w) - 4000000000w'
error = "overflow"

[[case]]
name = "num-duration-mul-int-overflow-raises"
src = '999999w * 999999'
error = "overflow"

[[case]]
name = "num-int-mul-duration-overflow-raises"
src = '999999 * 999999w'
error = "overflow"

[[case]]
name = "num-abs-int-min-overflow-code"
# `.abs()` on i64::MIN raises the pinned `overflow` code (was `custom`).
src = '(-9223372036854775807 - 1).abs()'
error = "overflow"

# `size * float` / `duration * float` are CHECKED like their `* int` siblings.
# The float->int `as` cast SATURATES (NaN/negative->0, overflow->MAX), so these
# used to silently return garbage (`9000000000000000000b * 100.0` yielded
# `18446744.07tb`; `1000b * -1.0` yielded `0b`) instead of erroring the way the
# integer arms do. See crates/shoal-value/src/ops.rs.

[[case]]
name = "num-size-mul-float-overflow-raises"
src = '9000000000000000000b * 100.0'
error = "overflow"
error_contains = "size overflow"

[[case]]
name = "num-float-mul-size-overflow-raises"
src = '100.0 * 9000000000000000000b'
error = "overflow"
error_contains = "size overflow"

[[case]]
name = "num-size-mul-negative-float-cannot-go-negative"
src = '1000b * -1.0'
error = "type_error"
error_contains = "negative"

[[case]]
name = "num-negative-float-mul-size-cannot-go-negative"
src = '-1.0 * 1000b'
error = "type_error"
error_contains = "negative"

[[case]]
name = "num-duration-mul-float-overflow-raises"
src = '5000000000w * 1000.0'
error = "overflow"
error_contains = "duration overflow"

[[case]]
name = "num-float-mul-duration-overflow-raises"
src = '1000.0 * 5000000000w'
error = "overflow"
error_contains = "duration overflow"

# A negative duration is legal, so `duration * negative float` is NOT an error
# (unlike size): it just yields a negative duration, matching `* negative int`.
[[case]]
name = "num-duration-mul-negative-float-is-negative-duration"
src = '5s * -1.0'
value = "-5s"

# Well-formed `size * float` / `duration * float` still work (rounding cast).
[[case]]
name = "num-size-mul-float-in-range-ok"
src = '2kb * 1.5'
value = "3kb"

[[case]]
name = "num-duration-mul-float-in-range-ok"
src = '30s * 1.5'
value = "45s"

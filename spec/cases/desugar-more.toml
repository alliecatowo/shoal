# Further site/content/internals/language-conformance-contract.md desugaring-table rows not yet covered by desugar.toml: the
# `< file` stdin redirect (only `>`/`>>` were exercised there), negative
# numeric flag values, and a real spec/impl gap found while probing the
# `list<path>` callee-side glob-expansion promise.

[[case]]
name = "desugar2-stdin-redirect-feeds-file-to-external"
# `cmd < f` -> stdin-from-file capture (site/content/internals/language-conformance-contract.md); `sh -c 'sort'` reads its
# stdin and sorts the three lines from the redirected file.
fixture = ["in.txt"]
src = '''
"b\na\nc".save("in.txt")
(sh -c 'sort' < in.txt).out
'''
value = '"a\nb\nc"'

[[case]]
name = "desugar2-negative-number-flag-value"
# `--n=-5` -> `named(n: w"-5")` coerced to `int` at call-bind; the leading `-`
# is part of the flag's VALUE text, not a second
# flag.
src = "fn f(n: int = 0) { n }\nf --n=-5"
value = "-5"

[[case]]
name = "desugar2-alias-flags-pass-through-to-adapter-invocation"
# site/content/internals/language-conformance-contract.md: "later args append" to the aliased call's argv — but for a
# FLAG appended after the fact (as opposed to baked into the alias
# definition itself, which does work: see desugar.toml's
# `desugar-alias-appends-later-args` for the positional-arg case), the
# adapter-resolved `.cmd` field silently drops it: a direct
# `(git status --short).cmd` correctly renders `"git status --short"`, but
# going through `alias gs = git status; gs --short` renders only
# `"git status"`.
src = "alias gs = git status\n(gs --short).cmd"
value = '"git status --short"'

# The `.field`/`.method` implicit-lambda shorthand only desugars when it is the
# WHOLE call argument (`.map(.name)`). A leading `.` anywhere else — e.g. inside
# a record literal passed to `.map({a: .name})` — has no receiver and gets a
# teaching parse error pointing at the explicit `x => …` form. See
# crates/shoal-syntax/src/parser/expr.rs (primary, `Tok::Dot` arm).

[[case]]
name = "dm-leading-dot-in-record-literal-is-teaching-error"
src = '[{a: 1}].map({x: .a})'
parse_error = true
parse_error_contains = "leading `.` has no receiver"

[[case]]
name = "dm-explicit-lambda-record-projection-works"
src = '[{a: 1}, {a: 2}].map(x => {v: x.a}).map(.v)'
value = "[1, 2]"

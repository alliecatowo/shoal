# Further `.feed` hardening beyond io.toml's first pass: the scalar rows of
# site/content/internals/values-streams-execution.md feedability table (int/bool feed their `render_inline` text —
# these two cases previously pinned the pre-implementation `type_error`, and
# were UPDATED when feed_bytes gained the documented scalar serialization;
# more scalar coverage lives in method-errors.toml), and a non-str list's
# fall-through to compact-JSON serialization (feed_bytes's `list<str>` fast
# path only applies when EVERY element is already a `str`; a `list<int>`
# falls to the generic JSON branch, and `cat`'s passthrough plus `.out`'s
# lazy JSON-sniff round-trips it back to a list).

[[case]]
name = "iofeed2-int-receiver-feeds-decimal-text"
# int → decimal text via `render_inline` (site/content/internals/values-streams-execution.md), no trailing newline.
src = "5.feed(cat).out"
value = '"5"'

[[case]]
name = "iofeed2-bool-receiver-feeds-render-form"
src = "true.feed(cat).out"
value = '"true"'

[[case]]
name = "iofeed2-int-list-feeds-as-compact-json-and-reparses"
# `[1, 2, 3]` isn't a `list<str>`, so `feed_bytes` falls to the generic
# JSON branch, serializing it as the single line `[1,2,3]`; `cat` echoes
# that byte-for-byte, and `.out`'s lazy JSON sniff (leading `[`) parses it
# straight back into the same list.
src = "[1, 2, 3].feed(cat).out"
value = "[1, 2, 3]"

[[case]]
name = "iofeed2-record-feeds-as-compact-json-and-reparses"
src = "{n: 5}.feed(cat).out"
value = "{n: 5}"

# `.feed(cmd args…)` parses its argument in CMD mode when it starts with a
# command head (site/content/internals/values-streams-execution.md), so a command with flags/args works bare:
# `.feed(sort -r)`, `.feed(jq ".a")`. A value-shaped argument (the inverted
# `cmd.feed(value)` form) has no command head and stays an expression. Block
# forms (`sh {…}`, `jq {…}`) also work. See
# crates/shoal-syntax/src/parser/expr.rs (postfix `.feed` arm) and
# crates/shoal-eval/src/expr_access.rs::eval_feed.

[[case]]
name = "feed-bare-command-no-args"
src = '["b", "a", "c"].feed(sort).out.trim()'
value = '"a\nb\nc"'

[[case]]
name = "feed-bare-command-with-flag"
src = '["b", "a", "c"].feed(sort -r).out.trim()'
value = '"c\nb\na"'

[[case]]
name = "feed-bare-command-with-quoted-arg"
src = '"foo\nbar\nfoobar".feed(grep "foo").out.trim()'
value = '"foo\nfoobar"'

[[case]]
name = "feed-block-form-with-args"
src = '["b", "a", "c"].feed(sh { sort -r }).out.trim()'
value = '"c\nb\na"'

[[case]]
name = "feed-inverted-cmd-dot-feed-value"
src = 'sort.feed(["b", "a", "c"]).out.trim()'
value = '"a\nb\nc"'

[cmd.cargo]
bin = "cargo"
class = "cli"
ok_codes = [0]
effects = ["fs.read(cwd)"]

[cmd.cargo.sub.build]
params = { release = "bool", jobs = "int?", package = "str?", target = "str?", all_features = "bool" }
flags = { short = { j = "jobs", p = "package" } }
effects = ["fs.read(cwd)", "fs.write(cwd/target)", "net.connect(crates.io:443)"]

[cmd.cargo.sub.test]
params = { release = "bool", jobs = "int?", package = "str?", test = "str?", no_run = "bool" }
flags = { short = { j = "jobs", p = "package" } }
effects = ["fs.read(cwd)", "fs.write(cwd/target)", "proc.spawn(test-binaries)"]

[cmd.cargo.sub.run]
params = { release = "bool", package = "str?", bin = "str?", args = "list<str>" }
flags = { short = { p = "package" } }
effects = ["fs.read(cwd)", "fs.write(cwd/target)", "proc.spawn(target-binary)"]

[cmd.cargo.sub.check]
params = { package = "str?", all_targets = "bool", all_features = "bool" }
flags = { short = { p = "package" } }
effects = ["fs.read(cwd)", "fs.write(cwd/target)"]

[cmd.cargo.sub.metadata]
params = { no_deps = "bool", all_features = "bool" }
invoke = ["metadata", "--format-version", "1"]
output = { parse = "json", type = "record" }
effects = ["fs.read(cwd)", "net.connect(crates.io:443)"]

# `cargo tree` is intentionally not given a `[cmd.cargo.sub.tree]` entry:
# its default output is a human-oriented box-drawing dependency tree with
# no stable machine-readable shape (unlike `metadata --format-version 1`),
# so declaring an `output.type` for it would promise a parse this crate
# cannot honestly deliver. Per TDD §6, only promise a type the parser
# genuinely yields.

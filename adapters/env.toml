# POSIX `env` with no arguments dumps the current process environment as
# exactly one `KEY=VALUE` pair per line -- the precise shape the `kv` parser
# (added for tools like this) was built for. A value containing its own `=`
# (e.g. real `DEBUGINFOD_URLS=ima:enforcing https://...`) still parses
# correctly: `kv` splits on the *first* `=`/`:` per line (`split_once`), and
# POSIX environment variable names never contain `=` themselves, so the key
# is unambiguous and the remainder -- `=`s and all -- becomes the value.
#
# No params/positional: `env`'s other real modes (`env -i`, or
# `env VAR=val cmd...` to run a command in a modified environment) don't
# produce this same structured dump at all -- they either suppress it or
# replace it with running an arbitrary program -- so this adapter models
# only the bare "print my environment" invocation.
[cmd.env]
bin = "env"
class = "cli"
ok_codes = [0]
output = { parse = "kv", type = "record" }

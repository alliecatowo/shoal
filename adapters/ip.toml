# Linux (iproute2) only: macOS has no `ip` command and no direct portable
# equivalent that emits JSON (`ifconfig`/`netstat` output is unstructured
# free text with incompatible flags across BSD and Linux). Like
# `systemctl`, this adapter names a specific ecosystem tool rather than a
# POSIX-portable one, and fails loudly with "command not found" on macOS
# rather than guessing at a lookalike that would silently misparse.
[cmd.ip]
bin = "ip"
class = "cli"
ok_codes = [0]

[cmd.ip.sub.addr]
invoke = ["-j", "addr", "show"]
output = { parse = "json", type = "table<{ifname: str, addr_info: list<record>}>" }

[cmd.ip.sub.route]
invoke = ["-j", "route", "show"]
output = { parse = "json", type = "table<{dst: str, dev: str, gateway: str}>" }

# Network interfaces themselves (link layer): distinct from `addr` (which is
# per-address, and only lists interfaces that HAVE an assigned address) and
# `route` (routing table). A loopback-only or address-less-but-up interface
# (a bridge, a down NIC) still shows up here. Real `ip -j link show` is a
# top-level JSON array of per-interface objects, same uniform-array shape as
# `addr`/`route`, so it stays a genuine `table<{...}>`, not a `record`
# envelope.
[cmd.ip.sub.link]
invoke = ["-j", "link", "show"]
output = { parse = "json", type = "table<{ifindex: int, ifname: str, mtu: int, operstate: str, address: str}>" }

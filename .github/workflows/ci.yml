name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.os }}
      - name: Build
        run: cargo build --workspace --all-targets --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Conformance corpus
        run: cargo test -p shoal --test conformance --locked -- --nocapture

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Format
        run: cargo fmt --all --check
      - name: Reject raw kernel lock unwraps
        run: |
          if rg --multiline '\.(lock|read|write)\(\)\s*\.unwrap\(\)' crates/shoal-kernel/src; then
            echo 'raw kernel lock unwraps bypass the subsystem poison policy'
            exit 1
          fi
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  release-build:
    name: release build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.os }}
      - name: Build release
        run: cargo build --workspace --release --locked

  fuzz-build:
    name: fuzz targets build
    runs-on: ubuntu-latest
    # Blocking per-PR compile smoke: every declared target must keep building.
    # The scheduled workflow below is the behavioral runtime fuzz gate.
    # rust-toolchain.toml pins stable repo-wide; cargo-fuzz needs nightly
    # sanitizer flags, so explicitly select the nightly installed below.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly 2026-07-17
      - run: sudo apt-get update && sudo apt-get install -y clang
      # Pin installed tools too: `--locked` alone only locks the selected release's dependencies.
      - run: cargo install cargo-fuzz --version 0.13.2 --locked
      # cargo-fuzz has no --locked option. Reject a stale fuzz workspace
      # lockfile before its build can resolve and rewrite dependencies.
      - run: cargo metadata --manifest-path fuzz/Cargo.toml --locked --no-deps --format-version 1 > /dev/null
      - run: cargo fuzz build --fuzz-dir fuzz

  supply-chain-audit:
    # HR-F6 (site/content/internals/hardening-roadmap.md): RUSTSEC advisory checks over the root and
    # independently locked fuzz dependency graphs. The allowlist for accepted advisories lives in
    # `.cargo/audit.toml` (cargo-audit's own auto-discovered config path) with a reason and revisit
    # condition per entry — do not weaken this job with ad-hoc `--ignore` flags.
    name: supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: supply-chain-audit
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - run: cargo audit
      - run: cargo audit --file fuzz/Cargo.lock

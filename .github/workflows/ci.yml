name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.os }}
      - name: Bootstrap Shoal
        run: cargo build -p shoal --locked
      - name: Test through Shoal
        run: target/debug/shoal scripts/ci-test.shl

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
        with:
          components: rustfmt, clippy
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Bootstrap Shoal
        run: cargo build -p shoal --locked
      - name: Lint through Shoal
        run: target/debug/shoal scripts/ci-lint.shl

  release-build:
    name: release build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: release-${{ matrix.os }}
      - name: Bootstrap Shoal
        run: cargo build -p shoal --locked
      - name: Build release through Shoal
        run: target/debug/shoal scripts/ci-release-build.shl

  fuzz-build:
    name: fuzz targets build
    runs-on: ubuntu-latest
    # Blocking per-PR compile smoke: every declared target must keep building.
    # The scheduled workflow below is the behavioral runtime fuzz gate.
    # rust-toolchain.toml pins stable repo-wide; cargo-fuzz needs nightly
    # sanitizer flags, so explicitly select the nightly installed below.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly 2026-07-17
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
      - name: Bootstrap Shoal
        run: cargo build -p shoal --locked
      - name: Build fuzz targets through Shoal
        run: target/debug/shoal scripts/ci-fuzz-build.shl

  supply-chain-audit:
    # HR-F6 (site/content/internals/hardening-roadmap.md): RUSTSEC advisory checks over the root and
    # independently locked fuzz dependency graphs. The allowlist for accepted advisories lives in
    # `.cargo/audit.toml` (cargo-audit's own auto-discovered config path) with a reason and revisit
    # condition per entry — do not weaken this job with ad-hoc `--ignore` flags.
    name: supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: supply-chain-audit
      - name: Bootstrap Shoal
        run: cargo build -p shoal --locked
      - name: Audit through Shoal
        run: target/debug/shoal scripts/ci-audit.shl

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}
      - name: Build
        run: cargo build --workspace --all-targets --locked
      - name: Test
        run: cargo test --workspace --locked
      - name: Conformance corpus
        run: cargo test -p shoal --test conformance --locked -- --nocapture

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Reject raw kernel lock unwraps
        run: |
          if rg --multiline '\.(lock|read|write)\(\)\s*\.unwrap\(\)' crates/shoal-kernel/src; then
            echo 'raw kernel lock unwraps bypass the subsystem poison policy'
            exit 1
          fi
      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  release-build:
    name: release build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.os }}
      - name: Build release
        run: cargo build --workspace --release --locked

  fuzz-build:
    name: fuzz targets build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - run: sudo apt-get update && sudo apt-get install -y clang
      - run: cargo install cargo-fuzz --locked
      - run: cargo fuzz build --fuzz-dir fuzz

  supply-chain-audit:
    # HR-F6 (site/content/internals/hardening-roadmap.md): RUSTSEC advisory check over
    # Cargo.lock. The allowlist for accepted advisories lives in `.cargo/audit.toml` (cargo-audit's
    # own auto-discovered config path) with a reason and revisit condition per entry — do not
    # weaken this job by adding ad-hoc `--ignore` flags here instead of documenting them there.
    name: supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: supply-chain-audit
      - run: cargo install cargo-audit --locked
      - run: cargo audit

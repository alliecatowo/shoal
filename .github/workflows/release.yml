name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
        with:
          targets: ${{ matrix.target }}
      - uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - name: Bootstrap Shoal
        run: cargo build -p shoal --locked
      - name: Build and package through Shoal
        env:
          SHOAL_RELEASE_TAG: ${{ github.ref_name }}
          SHOAL_RELEASE_TARGET: ${{ matrix.target }}
        run: target/debug/shoal scripts/release-package.shl
      - name: Upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            shoal-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
            shoal-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256
          generate_release_notes: true

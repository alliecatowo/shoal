name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@35a842e360814583e976785eeda0bd0655cb8e83 # 1.97.0
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: ${{ matrix.target }}
      - name: Install cross linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build binaries
        run: cargo build --release --locked --workspace --bins --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          dist="shoal-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "$dist"
          # Copy every non-example executable produced for this target.
          find "target/${{ matrix.target }}/release" -maxdepth 1 -type f -perm -u+x \
            ! -name '*.d' ! -name '*.rlib' ! -name '*.so' ! -name '*.dylib' \
            -exec cp {} "$dist/" \;
          cp README.md LICENSE* "$dist/" 2>/dev/null || true
          tar czf "$dist.tar.gz" "$dist"
          echo "ASSET=$dist.tar.gz" >> "$GITHUB_ENV"
      - name: Upload to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: ${{ env.ASSET }}
          generate_release_notes: true

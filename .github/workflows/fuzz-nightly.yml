name: Scheduled fuzz

# HR-F4 (site/content/internals/hardening-roadmap.md): the `fuzz-build` job in ci.yml only
# compiles the libFuzzer targets as a blocking check on every push/PR (no timed run) — deep audit
# finding H12 is that fuzz targets exist but nothing ever actually runs them. This workflow runs
# each target for a short, fixed budget on a nightly schedule and fails the job (no
# continue-on-error) if libFuzzer finds a crash, timeout, or OOM, so a regression surfaces here
# instead of silently sitting unexercised.
#
# Budget choice: 120s per target is a deliberate smoke, not exhaustive, tradeoff. Targets run as a
# matrix so syntax, planner, value/wire, frame, stream, and policy failures are isolated and can run
# concurrently. Checked-in seeds provide useful starting states; longer corpus-accumulating
# campaigns remain complementary to this bounded nightly gate.

on:
  schedule:
    # 07:00 UTC daily.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      seconds_per_target:
        description: "libFuzzer max_total_time per target, in seconds"
        default: "120"
        required: false

concurrency:
  group: fuzz-nightly
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fuzz:
    name: fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    # Override the repository's pinned stable toolchain for cargo-fuzz.
    env:
      RUSTUP_TOOLCHAIN: nightly
    strategy:
      fail-fast: false
      matrix:
        target: [lexer, parser, proto_frame, planner, value_wire, stream, policy]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          key: fuzz-${{ matrix.target }}
          workspaces: fuzz -> target
      - run: sudo apt-get update && sudo apt-get install -y clang
      - run: cargo install cargo-fuzz --locked
      # cargo-fuzz has no --locked option; reject fuzz/Cargo.lock drift first.
      - run: cargo metadata --manifest-path fuzz/Cargo.toml --locked --no-deps --format-version 1 > /dev/null
      - name: Run ${{ matrix.target }} for a bounded budget
        run: |
          cargo fuzz run "${{ matrix.target }}" --fuzz-dir fuzz -- \
            -max_total_time="${{ github.event.inputs.seconds_per_target || '120' }}"
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          if-no-files-found: ignore
